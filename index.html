function adjustColor(color, amount) {
  // Simple lighten/darken helper for #rrggbb colors
  const num = parseInt(color.slice(1), 16);
  let r = (num >> 16) + amount;
  let g = ((num >> 8) & 0x00FF) + amount;
  let b = (num & 0x0000FF) + amount;
  r = Math.min(255, Math.max(0, r));
  g = Math.min(255, Math.max(0, g));
  b = Math.min(255, Math.max(0, b));
  return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return getDefaultSave();
    const parsed = JSON.parse(raw);
    return {
      ...getDefaultSave(),
      ...parsed,
      unlockedSkins: Array.isArray(parsed.unlockedSkins) ? parsed.unlockedSkins : ["default"],
      unlockedWeapons: Array.isArray(parsed.unlockedWeapons) ? parsed.unlockedWeapons : ["soro", "tiro", "escudo"],

      boughtMoreAmmo: !!parsed.boughtMoreAmmo,
      boughtCoinBoost: !!parsed.boughtCoinBoost,
      boughtDailyGift: !!parsed.boughtDailyGift,
    };
  } catch (e) {
    console.warn("Falha ao carregar save:", e);
    return getDefaultSave();
  }
}

function saveProgress() {
  try {
    const data = {

      bestDistance: Math.max(game.bestDistance || 0, Math.floor(game.distance || 0)),

      boughtCoinBoost: !!game.boughtCoinBoost,
      boughtDailyGift: !!game.boughtDailyGift,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) {
    console.warn("Falha ao salvar progresso:", e);
  }
}

function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  GROUND_Y = H - GROUND_OFFSET;
  scale = Math.min(W / 800, H / 600, 1.5);
}

// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    if (Array.isArray(r) && r.length === 1) r = [r[0], r[0], r[0], r[0]];
    const [tl, tr, br, bl] = r.length === 4 ? r : [r[0]||0, r[0]||0, r[0]||0, r[0]||0];
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

// ============================================================
let audioCtx = null;
let audioMuted = false;
let musicGain = null;
let sfxGain = null;
let musicNodes = [];

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.15;
    musicGain.connect(audioCtx.destination);
    sfxGain = audioCtx.createGain();
    sfxGain.gain.value = 0.25;
    sfxGain.connect(audioCtx.destination);
  } catch(e) {}
}

function playTone(freq, duration, type, gainNode, volume) {
  if (!audioCtx || audioMuted) return;
  try {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(volume || 0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(g).connect(gainNode || sfxGain);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function sfxJump() {
  playTone(400, 0.1, 'square', sfxGain, 0.2);
  setTimeout(() => playTone(600, 0.08, 'square', sfxGain, 0.15), 50);
}

function sfxCollect() {
  playTone(523, 0.1, 'sine', sfxGain, 0.25);
  setTimeout(() => playTone(659, 0.1, 'sine', sfxGain, 0.2), 80);

}

function sfxHit() {
  playTone(100, 0.3, 'sawtooth', sfxGain, 0.3);
}

function sfxShoot() {
  playTone(800, 0.05, 'square', sfxGain, 0.1);
  setTimeout(() => playTone(600, 0.05, 'square', sfxGain, 0.08), 30);
}

function sfxHonk() {
  if (audioMuted || !audioCtx) return;
  playTone(392, 0.15, 'square', sfxGain, 0.15);
  setTimeout(() => playTone(392, 0.15, 'square', sfxGain, 0.15), 100);
}

function sfxGameOver() {

const MELODY_NORMAL = [262, 294, 330, 349, 392, 349, 330, 294];
const MELODY_DARK = [196, 220, 247, 262, 247, 220, 196, 174];
const MELODY_CHAOS = [174, 196, 185, 165, 147, 165, 147, 131];

function startMusic() {
  if (musicPlaying || !audioCtx || audioMuted) return;
  musicPlaying = true;

  const scene = getCurrentScene();
  let melody = MELODY_NORMAL;
  if (scene === "noite" || scene === "cti" || scene === "plantao" || scene === "crise") melody = MELODY_DARK;
  if (scene === "caos") melody = MELODY_CHAOS;

  let idx = 0;
  function playNote() {
    if (audioMuted || !musicPlaying) return;
    playTone(melody[idx % melody.length], 0.18, "triangle", musicGain, scene === "caos" ? 0.18 : 0.15);
    idx++;
  }

  playNote();
  musicInterval = setInterval(playNote, scene === "caos" ? 260 : 320);
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

function toggleMute() {
  audioMuted = !audioMuted;
  if (audioMuted) { stopMusic(); }
  else if (game.state === 'playing') { startMusic(); }
}

function pointInBox(mx, my, box) {
  return box && mx >= box.x && mx <= box.x + box.w && my >= box.y && my <= box.y + box.h;
}

// ============================================================
// INPUT HANDLING
// ============================================================
const Input = {
  keys: {},
  justPressed: {},
  touched: false,
  justTouched: false,
  touchX: 0,
  touchY: 0,

  init() {
    document.addEventListener('keydown', (e) => {
      if (!this.keys[e.code]) this.justPressed[e.code] = true;
      this.keys[e.code] = true;
      if (e.code === 'Space' || e.code === 'ArrowUp') e.preventDefault();
    });
    document.addEventListener('keyup', (e) => { this.keys[e.code] = false; });

    const updateTouch = (touch) => {
      const rect = canvas.getBoundingClientRect();
      this.touchX = touch.clientX - rect.left;
      this.touchY = touch.clientY - rect.top;
    };

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      updateTouch(touch);

      // Handle charSelect touches directly
      if (game.state === 'charSelect') {
        const mx = this.touchX;
        const my = this.touchY;
        if (pointInBox(mx, my, charSelectBoxes.male)) {
          game.selectedChar = 'male';
          initAudio(); if (audioCtx) audioCtx.resume();
          sfxCollect();
          return;
        } else if (pointInBox(mx, my, charSelectBoxes.female)) {
          game.selectedChar = 'female';
          initAudio(); if (audioCtx) audioCtx.resume();
          sfxCollect();
          return;
        } else if (pointInBox(mx, my, charSelectBoxes.play)) {
          resetGame();
          return;
        }
      }

      this.touched = true;
      this.justTouched = true;
      this.justPressed['Touch'] = true;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      updateTouch(touch);
    });

    canvas.addEventListener('touchend', () => {
      this.touched = false;
      this.touchX = 0;
      this.touchY = 0;
    });

    canvas.addEventListener('mousedown', (e) => {
      this.touched = true;
      this.justTouched = true;
      this.justPressed['Mouse'] = true;
      this.touchX = e.offsetX;
      this.touchY = e.offsetY;
    });

    canvas.addEventListener('mouseup', () => {
      this.touched = false;
      this.touchX = 0;
      this.touchY = 0;
    });
  },

  wantsJump() {
    const isShootTap = this.justTouched && isInShootButton(this.touchX, this.touchY);
    return this.justPressed['Space'] || this.justPressed['ArrowUp'] || this.justPressed['KeyW'] || (this.justTouched && !isShootTap);
  },

  wantsShoot() {
    const hasKey = this.justPressed['KeyX'] || this.justPressed['KeyF'];
    const isTouchShoot = this.justTouched && isInShootButton(this.touchX, this.touchY);
    return hasKey || isTouchShoot;
  },

  endFrame() {
    this.justPressed = {};
    this.justTouched = false;
  }
};
Input.init();

function isInShootButton(mx, my) {
  if (!game.isMobile) return false;
  const r = 40 * scale;
  const bx = W - 60;
  const by = H - 80;
  const dx = mx - bx;
  const dy = my - by;
  return dx * dx + dy * dy <= r * r;
}

// ============================================================
// PARTICLE SYSTEM (Object Pooled)
// ============================================================
class Particle {
  constructor() { this.active = false; }
  init(x, y, vx, vy, life, color, size) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.color = color; this.size = size;
    this.active = true;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 400 * dt;
    this.life -= dt;
    if (this.life <= 0) this.active = false;
  }
  draw(ctx) {
    const alpha = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    const s = this.size * (0.5 + 0.5 * alpha);
    ctx.fillRect(this.x - s/2, this.y - s/2, s, s);
    ctx.globalAlpha = 1;
  }
}

class ParticlePool {
  constructor(size) { this.pool = Array.from({ length: size }, () => new Particle()); }
  emit(x, y, count, cfg) {
    let emitted = 0;
    for (const p of this.pool) {
      if (!p.active && emitted < count) {
        const angle = Math.random() * Math.PI * 2;
        const speed = (cfg.speed || 150) * (0.5 + Math.random());
        p.init(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed - (cfg.upBias || 0),
          (cfg.life || 0.6) + Math.random() * (cfg.lifeVar || 0.3),
          cfg.colors ? cfg.colors[Math.floor(Math.random() * cfg.colors.length)] : (cfg.color || '#fff'),
          cfg.size || 4);
        emitted++;
      }
    }
  }
  update(dt) { for (const p of this.pool) if (p.active) p.update(dt); }
  draw(ctx) { for (const p of this.pool) if (p.active) p.draw(ctx); }
}

const particles = new ParticlePool(200);

// PARALLAX BACKGROUND
// ============================================================
class ParallaxLayer {
  constructor(speed, drawFn) {
    this.speed = speed;
    this.offset = 0;
    this.drawFn = drawFn;
  }
  update(dt, gameSpeed) {
    this.offset -= gameSpeed * this.speed * dt;
  }
  draw(ctx) {
    this.drawFn(ctx, this.offset);
  }
}

function drawSkyLayer(ctx, offset) {
  const scene = getCurrentScene();

  let topColor = "#1a3a5c";
  let midColor = "#3a7cb8";
  let lowColor = SKY_BLUE;
  let fogAlpha = 0.0;

  if (scene === "noite" || scene === "cti" || scene === "plantao") {
    topColor = "#02030b";
    midColor = "#09142a";
    lowColor = "#13294b";
    fogAlpha = 0.08;
  } else if (scene === "hospital" || scene === "upa" || scene === "sus") {
    topColor = "#12324f";
    midColor = "#2b6aa3";
    lowColor = "#9fd0ff";
  } else if (scene === "privada") {
    topColor = "#301848";
    midColor = "#8e44ad";
    lowColor = "#f1c40f";
  } else if (scene === "crise") {
    topColor = "#161616";
    midColor = "#3a2a2a";
    lowColor = "#5c4b3b";
    fogAlpha = 0.12;
  } else if (scene === "caos") {
    topColor = "#080808";
    midColor = "#1e0f0f";
    lowColor = "#4a1f1f";
    fogAlpha = 0.22;
  }

  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, topColor);
  grad.addColorStop(0.45, midColor);
  grad.addColorStop(0.82, lowColor);
  grad.addColorStop(1, scene === "caos" ? "#3b2020" : "#b8d8f0");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  const cloudAlpha =
    ["noite", "cti", "plantao", "crise", "caos"].includes(scene) ? 0.10 : 0.42;

  ctx.fillStyle = "rgba(255,255,255," + cloudAlpha + ")";
  for (const c of clouds) {
    const cx = (c.x + offset * 0.3) % (W + 200) - 100;
    ctx.beginPath();
    ctx.ellipse(cx, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  if (scene === "caos") {
    for (let i = 0; i < 7; i++) {
      const fx = ((i * 230) + offset * 0.15) % (W + 250) - 125;
      const fy = GROUND_Y - 180 - (i % 3) * 20;
      ctx.fillStyle = "rgba(255,120,0,0.22)";
      ctx.beginPath();
      ctx.arc(fx, fy, 38, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(40,40,40,0.22)";
      ctx.fillRect(fx - 18, fy - 55, 36, 55);
    }
  }

  if (fogAlpha > 0) {
    ctx.fillStyle = `rgba(70,70,70,${fogAlpha})`;
    ctx.fillRect(0, GROUND_Y * 0.55, W, GROUND_Y * 0.45);
  }
}

function drawBuildingLayer(ctx, offset) {
  const totalW = buildings.reduce((s, b) => s + b.w + 15, 0);
  for (const b of buildings) {
    const bx = ((b.x + offset) % totalW + totalW) % totalW - 200;
    if (bx > W + 100 || bx + b.w < -100) continue;
    const by = GROUND_Y - b.h;
    
    // Prédio Base
    ctx.fillStyle = b.color;
    ctx.fillRect(bx, by, b.w, b.h);
    
    // Detalhe arquitetônico lateral (sombra projetada no próprio prédio)
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(bx + b.w - 8, by, 8, b.h);

    // Windows com mais detalhes
    const wSize = 12;
    const wGapH = (b.w - 20) / Math.max(b.windows, 1);
    for (let r = 0; r < b.windowRows; r++) {
      for (let c = 0; c < b.windows; c++) {
        const wx = bx + 10 + c * wGapH;
        const wy = by + 15 + r * 35;
        
        // Moldura da janela
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(wx - 1, wy - 1, wSize + 2, wSize + 7);
        
        // Vidro iluminado
        ctx.fillStyle = 'rgba(255,240,150,0.7)';
        ctx.fillRect(wx, wy, wSize, wSize + 5);
        
        // Brilho no vidro
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(wx + 2, wy + 2, 3, 3);

        // Sacada opcional em alguns andares
        if (c === 0 && r % 2 === 0 && b.w > 120) {
            ctx.fillStyle = '#444';
            ctx.fillRect(wx - 5, wy + wSize + 5, b.w - 10, 3);
            // Grades da sacada
            for(let g = 0; g < b.w - 15; g += 10) {
                ctx.fillRect(wx - 5 + g, wy + wSize - 2, 2, 7);
            }
        }
      }
    }

    if (b.isPharmacy) {
      // Placa de Farmácia no Prédio
      ctx.fillStyle = PHARMACY_GREEN;
      ctx.fillRect(bx + b.w/2 - 25, by + 10, 50, 25);
      ctx.strokeStyle = WHITE;
      ctx.lineWidth = 2;
      ctx.strokeRect(bx + b.w/2 - 25, by + 10, 50, 25);
      
      // Cruz Piscante
      const flash = Math.floor(performance.now() / 500) % 2 === 0;
      ctx.fillStyle = flash ? PHARMACY_GREEN_LIGHT : WHITE;
      const crossX = bx + b.w / 2;
      const crossY = by + 22;
      ctx.fillRect(crossX - 3, crossY - 8, 6, 16);
      ctx.fillRect(crossX - 8, crossY - 3, 16, 6);
    }
  }
}

function drawStorefrontLayer(ctx, offset) {
  const totalW = storefronts.reduce((s, sf) => s + sf.w + 10, 0);
  for (const sf of storefronts) {
    const sx = ((sf.x + offset) % totalW + totalW) % totalW - 200;
    if (sx > W + 100 || sx + sf.w < -100) continue;
    const sy = GROUND_Y - sf.h;

    // Storefront body
    ctx.fillStyle = sf.color;
    ctx.fillRect(sx, sy, sf.w, sf.h);

    if (sf.isPharmacy) {
        // Fachada de Farmácia mais detalhada
        ctx.fillStyle = PHARMACY_GREEN_DARK;
        ctx.fillRect(sx - 5, sy, sf.w + 10, 20); // Testeira/Placa superior
        
        ctx.strokeStyle = WHITE;
        ctx.lineWidth = 1;
        ctx.strokeRect(sx - 5, sy, sf.w + 10, 20);

        // Texto na placa
        ctx.fillStyle = WHITE;
        ctx.font = `bold ${Math.min(11, sf.w / 8)}px 'Plus Jakarta Sans', sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText("FARMÁCIA", sx + sf.w/2, sy + 14);

        // Vitrine com prateleiras (linhas horizontais)
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.fillRect(sx + 5, sy + 25, sf.w - 10, sf.h - 30);
        
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        for(let py = sy + 35; py < sy + sf.h - 5; py += 12) {
            ctx.beginPath();
            ctx.moveTo(sx + 8, py);
            ctx.lineTo(sx + sf.w - 8, py);
            ctx.stroke();
            // Pequenos "frascos" nas prateleiras
            for(let px = sx + 12; px < sx + sf.w - 12; px += 8) {
                if (Math.random() > 0.3) {
                    ctx.fillStyle = `hsl(${Math.random()*360}, 70%, 70%)`;
                    ctx.fillRect(px, py - 6, 4, 6);
                }
            }
        }
    } else {
        // Awning para lojas normais
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(sx - 3, sy, sf.w + 6, 16);

        // Awnings (listras)
        for (let i = 0; i < sf.w; i += 12) {
          ctx.fillStyle = i % 24 === 0 ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)';
          ctx.fillRect(sx + i - 3, sy, 12, 16);
        }

        // Windows
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        const winW = sf.w * 0.18;
        const winH = sf.h * 0.25;
        for (let i = 0; i < 3; i++) {
          ctx.fillRect(sx + sf.w * 0.15 + i * (winW + 10), sy + sf.h * 0.35, winW, winH);
        }

        // Sign text
        ctx.fillStyle = WHITE;
        ctx.font = `bold ${Math.min(13, sf.w / 7)}px 'Plus Jakarta Sans', sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(sf.name, sx + sf.w / 2, sy + 35);
    }

    // Door (sempre presente)
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(sx + sf.w / 2 - 12, sy + sf.h - 40, 24, 40);
    // Maçaneta
    ctx.fillStyle = GOLD;
    ctx.beginPath();
    ctx.arc(sx + sf.w / 2 + 8, sy + sf.h - 20, 2, 0, Math.PI*2);
    ctx.fill();

    if (sf.isPharmacy) {
      // Cruz piscante lateral
      const flash = Math.floor(performance.now() / 400) % 2 === 0;
      ctx.fillStyle = flash ? PHARMACY_GREEN_LIGHT : WHITE;
      const cx = sx + sf.w - 15;
      const cy = sy + 35;
      ctx.fillRect(cx - 2, cy - 6, 4, 12);
      ctx.fillRect(cx - 6, cy - 2, 12, 4);
    }

    if (sf.damaged) {
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(sx + 8, sy + 18, sf.w - 16, 6);

      ctx.strokeStyle = "rgba(20,20,20,0.8)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx + 10, sy + 15);
      ctx.lineTo(sx + 30, sy + 35);
      ctx.lineTo(sx + 20, sy + 60);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(sx + sf.w - 15, sy + 20);
      ctx.lineTo(sx + sf.w - 28, sy + 50);
      ctx.lineTo(sx + sf.w - 18, sy + 75);
      ctx.stroke();

      if (getCurrentScene() === "caos") {
        ctx.fillStyle = "rgba(255,120,0,0.75)";
        ctx.beginPath();
        ctx.moveTo(sx + 20, sy + sf.h - 10);
        ctx.lineTo(sx + 30, sy + sf.h - 28);
        ctx.lineTo(sx + 40, sy + sf.h - 10);
        ctx.fill();

        ctx.fillStyle = "rgba(80,80,80,0.4)";
        ctx.fillRect(sx + 22, sy + sf.h - 42, 10, 18);
      }
    }
  }
  ctx.textAlign = 'left';
}

function drawStreetDetailsLayer(ctx, offset) {
  const spacing = 400;
  // i represents the screen-aligned grid positions.
  // We use offset (negative) to shift the entire grid smoothly.
  for (let i = -spacing; i < W + spacing; i += spacing) {
    const x = i + (offset % spacing);
    const y = GROUND_Y;
    
    // Seed determines if it's a lamp or tree based on world position
    const worldX = Math.round(i - offset + (offset % spacing));
    const seed = Math.floor(worldX / spacing);
    const isLamp = seed % 2 === 0;

    if (isLamp) {
      // Poste de Luz
      ctx.fillStyle = '#333';
      ctx.fillRect(x, y - 100, 4, 100);
      ctx.fillStyle = '#555';
      ctx.fillRect(x - 12, y - 105, 28, 6);
      
      // Detalhe da luminária
      ctx.fillStyle = '#444';
      ctx.fillRect(x - 2, y - 100, 8, 4);

      // Brilho da lâmpada (amarelado)
      ctx.fillStyle = 'rgba(255, 255, 150, 0.2)';
      ctx.beginPath();
      ctx.arc(x + 2, y - 102, 15, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Árvore
      ctx.fillStyle = '#5d4037'; // Tronco
      ctx.fillRect(x, y - 40, 8, 40);
      
      // Folhas com mais camadas
      ctx.fillStyle = '#1b5e20';
      ctx.beginPath();
      ctx.arc(x + 4, y - 55, 24, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#2e7d32';
      ctx.beginPath();
      ctx.arc(x - 8, y - 48, 18, 0, Math.PI * 2);
      ctx.arc(x + 16, y - 48, 18, 0, Math.PI * 2);
      ctx.arc(x + 4, y - 65, 20, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#4caf50';
      ctx.beginPath();
      ctx.arc(x + 2, y - 58, 12, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

const bgLayers = [
  new ParallaxLayer(0.1, drawSkyLayer),
  new ParallaxLayer(0.3, drawBuildingLayer),
  new ParallaxLayer(0.6, drawStorefrontLayer),
  new ParallaxLayer(0.8, drawStreetDetailsLayer),
];

// ============================================================
// CHARACTER DRAWING (shared for player + preview)
// ============================================================
function drawCharacter(ctx, x, y, w, grounded, legPhase, invincible, isFemale, drawScale) {
  const currentSkin = SKINS.find(s => s.id === game.skin) || SKINS[0];
  const bodyColor = isFemale ? currentSkin.colorFemale : currentSkin.colorMale;

  ctx.save();
  const s = drawScale || 1.0;
  const cx = x + w / 2;
  const baseY = y;

  if (isFemale) {
    // === FEMALE CHARACTER ===
    // Body (dress)
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.roundRect(cx - 11 * s, baseY + 14 * s, 22 * s, 24 * s, 4 * s);
    ctx.fill();
    // Dress flare
    ctx.beginPath();
    ctx.moveTo(cx - 13 * s, baseY + 34 * s);
    ctx.lineTo(cx - 8 * s, baseY + 14 * s);
    ctx.lineTo(cx + 8 * s, baseY + 14 * s);
    ctx.lineTo(cx + 13 * s, baseY + 34 * s);
    ctx.closePath();
    ctx.fill();

    // Head
    ctx.fillStyle = '#ffe0bd';
    ctx.beginPath();
    ctx.arc(cx, baseY + 10 * s, 10 * s, 0, Math.PI * 2);
    ctx.fill();

    // Hair (long, flowing)
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.arc(cx, baseY + 7 * s, 11 * s, Math.PI, Math.PI * 2);
    ctx.fill();
    // Side hair
    ctx.fillRect(cx - 11 * s, baseY + 5 * s, 4 * s, 18 * s);
    ctx.fillRect(cx + 7 * s, baseY + 5 * s, 4 * s, 18 * s);
    // Hair back
    ctx.fillStyle = '#6B3410';
    ctx.fillRect(cx - 9 * s, baseY + 8 * s, 3 * s, 22 * s);
    ctx.fillRect(cx + 6 * s, baseY + 8 * s, 3 * s, 22 * s);

    // Eyes
    ctx.fillStyle = '#333';
    ctx.fillRect(cx - 4 * s, baseY + 8 * s, 2.5 * s, 3 * s);
    ctx.fillRect(cx + 2 * s, baseY + 8 * s, 2.5 * s, 3 * s);
    // Eyelashes
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 0.8 * s;
    ctx.beginPath();
    ctx.moveTo(cx - 5 * s, baseY + 7 * s);
    ctx.lineTo(cx - 3 * s, baseY + 6 * s);
    ctx.moveTo(cx + 1.5 * s, baseY + 6 * s);
    ctx.lineTo(cx + 4 * s, baseY + 7 * s);
    ctx.stroke();

    // Smile
    ctx.strokeStyle = '#cc7766';
    ctx.lineWidth = 1 * s;
    ctx.beginPath();
    ctx.arc(cx, baseY + 13 * s, 3 * s, 0.1, Math.PI - 0.1);
    ctx.stroke();

    // Blush
    ctx.fillStyle = 'rgba(255,150,150,0.25)';
    ctx.beginPath();
    ctx.ellipse(cx - 6 * s, baseY + 12 * s, 2.5 * s, 1.5 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 6 * s, baseY + 12 * s, 2.5 * s, 1.5 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Arms
    ctx.fillStyle = '#ffe0bd';
    const armSwing = grounded ? Math.sin(legPhase) * 6 * s : -4 * s;
    ctx.fillRect(cx - 14 * s, baseY + 16 * s + armSwing, 4 * s, 13 * s);
    ctx.fillRect(cx + 10 * s, baseY + 16 * s - armSwing, 4 * s, 13 * s);

    // Legs
    ctx.fillStyle = '#ffe0bd';
    if (grounded) {
      const legSwing = Math.sin(legPhase) * 7 * s;
      ctx.fillRect(cx - 7 * s, baseY + 37 * s, 5 * s, 15 * s + legSwing * 0.4);
      ctx.fillRect(cx + 2 * s, baseY + 37 * s, 5 * s, 15 * s - legSwing * 0.4);
      // Shoes
      ctx.fillStyle = '#ff6699';
      ctx.fillRect(cx - 9 * s, baseY + 50 * s + legSwing * 0.4, 7 * s, 4 * s);
      ctx.fillRect(cx + 1 * s, baseY + 50 * s - legSwing * 0.4, 7 * s, 4 * s);
    } else {
      ctx.fillRect(cx - 7 * s, baseY + 36 * s, 5 * s, 12 * s);
      ctx.fillRect(cx + 2 * s, baseY + 36 * s, 5 * s, 12 * s);
      ctx.fillStyle = '#ff6699';
      ctx.fillRect(cx - 9 * s, baseY + 46 * s, 7 * s, 4 * s);
      ctx.fillRect(cx + 1 * s, baseY + 46 * s, 7 * s, 4 * s);
    }
  } else {
    // === MALE CHARACTER ===
    // Body
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.roundRect(cx - 10 * s, baseY + 14 * s, 20 * s, 22 * s, 4 * s);
    ctx.fill();

    // Head
    ctx.fillStyle = '#ffcc99';
    ctx.beginPath();
    ctx.arc(cx, baseY + 10 * s, 10 * s, 0, Math.PI * 2);
    ctx.fill();

    // Hair
    ctx.fillStyle = '#553322';
    ctx.beginPath();
    ctx.arc(cx, baseY + 6 * s, 10 * s, Math.PI, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#333';
    ctx.fillRect(cx - 4 * s, baseY + 8 * s, 2.5 * s, 3 * s);
    ctx.fillRect(cx + 2 * s, baseY + 8 * s, 2.5 * s, 3 * s);

    // Smile
    ctx.strokeStyle = '#996644';
    ctx.lineWidth = 1 * s;
    ctx.beginPath();
    ctx.arc(cx, baseY + 13 * s, 3 * s, 0, Math.PI);
    ctx.stroke();

    // Arms
    ctx.fillStyle = '#ffcc99';
    const armSwingM = grounded ? Math.sin(legPhase) * 6 * s : -4 * s;
    ctx.fillRect(cx - 14 * s, baseY + 16 * s + armSwingM, 5 * s, 14 * s);
    ctx.fillRect(cx + 9 * s, baseY + 16 * s - armSwingM, 5 * s, 14 * s);

    // Legs
    ctx.fillStyle = '#335577';
    if (grounded) {
      const legSwing = Math.sin(legPhase) * 7 * s;
      ctx.fillRect(cx - 8 * s, baseY + 35 * s, 6 * s, (17 + legSwing * 0.5) * s);
      ctx.fillRect(cx + 2 * s, baseY + 35 * s, 6 * s, (17 - legSwing * 0.5) * s);
      // Shoes
      ctx.fillStyle = '#cc4444';
      ctx.fillRect(cx - 10 * s, baseY + (50 + legSwing * 0.5) * s, 8 * s, 4 * s);
      ctx.fillRect(cx + 1 * s, baseY + (50 - legSwing * 0.5) * s, 8 * s, 4 * s);
    } else {
      ctx.fillRect(cx - 8 * s, baseY + 34 * s, 6 * s, 14 * s);
      ctx.fillRect(cx + 2 * s, baseY + 34 * s, 6 * s, 14 * s);
      ctx.fillStyle = '#cc4444';
      ctx.fillRect(cx - 10 * s, baseY + 46 * s, 8 * s, 4 * s);
      ctx.fillRect(cx + 1 * s, baseY + 46 * s, 8 * s, 4 * s);
    }
  }

  ctx.restore();
}

function drawNPCLikeCharacter(ctx, x, y, role, isFemale, legPhase, drawScale) {
  ctx.save();
  const s = drawScale || 1.0;
  const cx = x + (isFemale ? 11 : 10) * s; 
  const baseY = y;

  let bodyColor = "#555";
  let legColor = "#333";
  let shoeColor = "#222";
  let headColor = isFemale ? "#ffe0bd" : "#ffcc99";
  let hairColor = isFemale ? "#8B4513" : "#553322";

  if (role === "enfermeiro" || role === "medico") {
    bodyColor = "#ffffff";
    legColor = role === "medico" ? "#ffffff" : "#f0f0f0";
    shoeColor = "#eeeeee";
  } else if (role === "bem-vestido") {
    bodyColor = isFemale ? "#cc44aa" : "#2c3e50";
    legColor = isFemale ? "#ffcc99" : "#34495e";
  } else if (role === "policial") {
    bodyColor = "#1a237e";
    legColor = "#0d47a1";
    shoeColor = "#000000";
  } else if (role === "pathogen") {
    bodyColor = "#1b5e20"; // Verde doentio
    legColor = "#003300";
    headColor = "#aed581"; // Pele pálida/esverdeada
    hairColor = "#33691e";
    // Aura de patógeno
    const pulse = 0.6 + Math.sin(performance.now() / 200) * 0.4;
    ctx.shadowColor = "#00ff00";
    ctx.shadowBlur = 10 * pulse;
  }

  if (isFemale) {
    // Body (dress/uniform)
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.roundRect(cx - 11 * s, baseY + 14 * s, 22 * s, 24 * s, 4 * s);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx - 13 * s, baseY + 34 * s);
    ctx.lineTo(cx - 8 * s, baseY + 14 * s);
    ctx.lineTo(cx + 8 * s, baseY + 14 * s);
    ctx.lineTo(cx + 13 * s, baseY + 34 * s);
    ctx.closePath();
    ctx.fill();
    // Nurse/Doctor detail
    if (role === "enfermeiro" || role === "medico") {
        ctx.fillStyle = role === "enfermeiro" ? "#e74c3c" : "#3498db";
        ctx.fillRect(cx - 4*s, baseY + 20*s, 8*s, 2*s);
        ctx.fillRect(cx - 1*s, baseY + 17*s, 2*s, 8*s);
    }
    // Police detail
    if (role === "policial") {
        ctx.fillStyle = GOLD;
        ctx.beginPath();
        ctx.arc(cx - 5*s, baseY + 18*s, 2*s, 0, Math.PI*2);
        ctx.fill();
    }
    // Head & Hair
    ctx.fillStyle = headColor;
    ctx.beginPath(); ctx.arc(cx, baseY + 10 * s, 10 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = hairColor;
    ctx.beginPath(); ctx.arc(cx, baseY + 7 * s, 11 * s, Math.PI, Math.PI * 2); ctx.fill();
    ctx.fillRect(cx - 11 * s, baseY + 5 * s, 4 * s, 18 * s);
    ctx.fillRect(cx + 7 * s, baseY + 5 * s, 4 * s, 18 * s);
    // Smile
    ctx.strokeStyle = '#cc7766'; ctx.lineWidth = 1 * s;
    ctx.beginPath(); ctx.arc(cx, baseY + 13 * s, 3 * s, 0.1, Math.PI - 0.1); ctx.stroke();
    // Arms
    ctx.fillStyle = headColor;
    const armSwing = Math.sin(legPhase) * 6 * s;
    ctx.fillRect(cx - 14 * s, baseY + 16 * s + armSwing, 4 * s, 13 * s);
    ctx.fillRect(cx + 10 * s, baseY + 16 * s - armSwing, 4 * s, 13 * s);
    // Legs
    ctx.fillStyle = legColor;
    const legSwing = Math.sin(legPhase) * 7 * s;
    ctx.fillRect(cx - 7 * s, baseY + 37 * s, 5 * s, 15 * s + legSwing * 0.4);
    ctx.fillRect(cx + 2 * s, baseY + 37 * s, 5 * s, 15 * s - legSwing * 0.4);
    ctx.fillStyle = shoeColor;
    ctx.fillRect(cx - 9 * s, baseY + 50 * s + legSwing * 0.4, 7 * s, 4 * s);
    ctx.fillRect(cx + 1 * s, baseY + 50 * s - legSwing * 0.4, 7 * s, 4 * s);
  } else {
    // Body
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.roundRect(cx - 10 * s, baseY + 14 * s, 20 * s, 22 * s, 4 * s);
    ctx.fill();
    // Nurse/Doctor detail
    if (role === "enfermeiro" || role === "medico") {
        ctx.fillStyle = role === "enfermeiro" ? "#e74c3c" : "#3498db";
        ctx.fillRect(cx - 4*s, baseY + 20*s, 8*s, 2*s);
        ctx.fillRect(cx - 1*s, baseY + 17*s, 2*s, 8*s);
    }
    // Police detail
    if (role === "policial") {
        ctx.fillStyle = GOLD;
        ctx.beginPath();
        ctx.arc(cx - 5*s, baseY + 18*s, 2*s, 0, Math.PI*2);
        ctx.fill();
        // Hat
        ctx.fillStyle = "#1a237e";
        ctx.fillRect(cx - 12*s, baseY - 2*s, 24*s, 5*s);
        ctx.fillRect(cx - 8*s, baseY - 6*s, 16*s, 5*s);
    }
    // Head & Hair
    ctx.fillStyle = headColor;
    ctx.beginPath(); ctx.arc(cx, baseY + 10 * s, 10 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = hairColor;
    ctx.beginPath(); ctx.arc(cx, baseY + 6 * s, 10 * s, Math.PI, Math.PI * 2); ctx.fill();
    // Smile
    ctx.strokeStyle = '#996644'; ctx.lineWidth = 1 * s;
    ctx.beginPath(); ctx.arc(cx, baseY + 13 * s, 3 * s, 0, Math.PI); ctx.stroke();
    // Arms
    ctx.fillStyle = headColor;
    const armSwingM = Math.sin(legPhase) * 6 * s;
    ctx.fillRect(cx - 14 * s, baseY + 16 * s + armSwingM, 5 * s, 14 * s);
    ctx.fillRect(cx + 9 * s, baseY + 16 * s - armSwingM, 5 * s, 14 * s);
    // Legs
    ctx.fillStyle = legColor;
    const legSwingNPC = Math.sin(legPhase) * 7 * s;
    ctx.fillRect(cx - 8 * s, baseY + 35 * s, 6 * s, (17 + legSwingNPC * 0.5) * s);
    ctx.fillRect(cx + 2 * s, baseY + 35 * s, 6 * s, (17 - legSwingNPC * 0.5) * s);
    ctx.fillStyle = shoeColor;
    ctx.fillRect(cx - 10 * s, baseY + (50 + legSwingNPC * 0.5) * s, 8 * s, 4 * s);
    ctx.fillRect(cx + 1 * s, baseY + (50 - legSwingNPC * 0.5) * s, 8 * s, 4 * s);
  }
  ctx.restore();
}

function drawVehicle(ctx, x, y, w, h, model, color, direction = -1, variant = 0) {
  ctx.save();
  if (direction === 1) {
    ctx.translate(x + w, 0);
    ctx.scale(-1, 1);
    x = 0;
  }

  // Base colors and styling
  const baseColor = color;
  const shadowColor = adjustColor(baseColor, -25);
  const detailColor = adjustColor(baseColor, 25);
  const glassColor = 'rgba(255,255,255,0.65)';
  const wheelColor = '#222';
  const rimColor = '#555';

  // Variant affects roof profile and accent details
  const v = variant % 3;
  const roofInset = 0.16 + v * 0.02;
  const roofHeight = 0.28 + v * 0.03;
  const bodyRound = h * (0.22 + v * 0.03);
  const bumperHeight = h * 0.16;

  // Adjust for different model silhouettes
  let bodyHeight = h * 0.55;
  let bodyYOffset = y + h * 0.2;
  if (model === 'suv') {
    bodyHeight = h * 0.6;
    bodyYOffset = y + h * 0.18;
  } else if (model === 'truck') {
    bodyHeight = h * 0.52;
    bodyYOffset = y + h * 0.22;
  } else if (model === 'sport') {
    bodyHeight = h * 0.5;
    bodyYOffset = y + h * 0.24;
  }

  // Main body
  ctx.fillStyle = baseColor;
  ctx.beginPath();
  ctx.roundRect(x, bodyYOffset, w, bodyHeight, bodyRound);
  ctx.fill();

  // Truck bed / sport splitter details
  if (model === 'truck') {
    ctx.fillStyle = adjustColor(baseColor, -10);
    const bedX = x + w * 0.42;
    const bedW = w * 0.5;
    const bedY = bodyYOffset + bodyHeight * 0.28;
    const bedH = bodyHeight * 0.45;
    ctx.beginPath();
    ctx.roundRect(bedX, bedY, bedW, bedH, bodyRound * 0.6);
    ctx.fill();
  } else if (model === 'sport') {
    ctx.fillStyle = adjustColor(baseColor, -25);
    ctx.fillRect(x + w * 0.05, bodyYOffset + bodyHeight * 0.88, w * 0.9, h * 0.06);
  }

  // Shadow along the bottom edge
  ctx.fillStyle = shadowColor;
  ctx.beginPath();
  ctx.roundRect(x, bodyYOffset + bodyHeight - bumperHeight * 0.6, w, bumperHeight * 0.6, bodyRound * 0.6);
  ctx.fill();

  // Roof/hood shape
  const roofY = bodyYOffset + (model === 'truck' ? bodyHeight * 0.08 : bodyHeight * 0.12);
  ctx.fillStyle = detailColor;
  ctx.beginPath();
  ctx.moveTo(x + w * roofInset, roofY);
  ctx.lineTo(x + w * (1 - roofInset), roofY);
  ctx.lineTo(x + w * 0.82, roofY + bodyHeight * roofHeight);
  ctx.lineTo(x + w * 0.18, roofY + bodyHeight * roofHeight);
  ctx.closePath();
  ctx.fill();

  // Windows
  ctx.fillStyle = glassColor;
  const winY = roofY + bodyHeight * roofHeight * 0.08;
  const winH = bodyHeight * 0.22;
  if (model === 'truck') {
    ctx.fillRect(x + w * 0.12, winY, w * 0.32, winH);
    ctx.fillRect(x + w * 0.56, winY, w * 0.24, winH);
  } else {
    ctx.fillRect(x + w * 0.14, winY, w * 0.26, winH);
    ctx.fillRect(x + w * 0.5, winY, w * 0.26, winH);
    if (model === 'minivan' || model === 'suv') {
      ctx.fillRect(x + w * 0.79, winY, w * 0.14, winH);
    }
  }

  // Door line + optional stripe
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = Math.max(1, h * 0.025);
  ctx.beginPath();
  ctx.moveTo(x + w * 0.5, bodyYOffset + bodyHeight * 0.25);
  ctx.lineTo(x + w * 0.5, bodyYOffset + bodyHeight * 0.62);
  ctx.stroke();

  if (v === 1) {
    ctx.strokeStyle = adjustColor(baseColor, 40);
    ctx.lineWidth = Math.max(1, h * 0.018);
    ctx.beginPath();
    ctx.moveTo(x + w * 0.1, bodyYOffset + bodyHeight * 0.55);
    ctx.lineTo(x + w * 0.9, bodyYOffset + bodyHeight * 0.55);
    ctx.stroke();
  }

  // Headlights/taillights
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillRect(x + w * 0.06, bodyYOffset + bodyHeight * 0.62, w * 0.11, h * 0.08);
  ctx.fillRect(x + w * 0.83, bodyYOffset + bodyHeight * 0.62, w * 0.11, h * 0.08);

  // Side stripe / two-tone accents
  if (v === 0) {
    ctx.fillStyle = adjustColor(baseColor, -30);
    ctx.fillRect(x + w * 0.12, bodyYOffset + bodyHeight * 0.42, w * 0.76, h * 0.06);
  } else if (v === 1) {
    ctx.fillStyle = adjustColor(baseColor, -20);
    ctx.fillRect(x + w * 0.48, bodyYOffset + bodyHeight * 0.18, w * 0.04, bodyHeight * 0.64);
  } else if (v === 2) {
    // Two-tone roof
    ctx.fillStyle = adjustColor(baseColor, -35);
    ctx.fillRect(x + w * 0.12, roofY - h * 0.04, w * 0.76, h * 0.08);
  }

  // Wheels
  const wheelR = Math.max(4, h * (model === 'truck' ? 0.22 : 0.18));
  ctx.fillStyle = wheelColor;
  ctx.beginPath();
  ctx.arc(x + w * 0.22, y + h, wheelR, 0, Math.PI * 2);
  ctx.arc(x + w * 0.78, y + h, wheelR, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = rimColor;
  ctx.beginPath();
  ctx.arc(x + w * 0.22, y + h, wheelR * 0.55, 0, Math.PI * 2);
  ctx.arc(x + w * 0.78, y + h, wheelR * 0.55, 0, Math.PI * 2);
  ctx.fill();

  // Rim spokes (simple detail)
  ctx.strokeStyle = adjustColor(rimColor, 40);
  ctx.lineWidth = Math.max(1, h * 0.01);
  for (const cx of [x + w * 0.22, x + w * 0.78]) {
    ctx.beginPath();
    ctx.moveTo(cx, y + h - wheelR * 0.25);
    ctx.lineTo(cx - wheelR * 0.17, y + h + wheelR * 0.05);
    ctx.moveTo(cx, y + h - wheelR * 0.25);
    ctx.lineTo(cx + wheelR * 0.17, y + h + wheelR * 0.05);
    ctx.stroke();
  }

  // Spoiler / roof rack details for some variants
  if (v === 2) {
    ctx.fillStyle = adjustColor(baseColor, -40);
    ctx.fillRect(x + w * 0.68, bodyYOffset + bodyHeight * 0.08, w * 0.22, h * 0.04);
    ctx.fillRect(x + w * 0.15, bodyYOffset + bodyHeight * 0.08, w * 0.18, h * 0.04);
  }

  ctx.restore();
}

// ============================================================
// PLAYER CHARACTER
// ============================================================
class Player {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = 80;
    this.y = 0;
    this.w = PLAYER_W;
    this.h = PLAYER_H;
    this.vy = 0;
    this.grounded = true;
    this.canDoubleJump = true; // Always allow double jump
    this.hasDoubleJumped = false;
    this.legPhase = 0;
    this.invincible = false;
    this.invincibleTimer = 0;
    this.hitFlash = 0;
    this.y = GROUND_Y - this.h;
  }

  jump() {
    if (this.grounded) {
      this.vy = JUMP_VELOCITY;
      this.grounded = false;
      this.hasDoubleJumped = false;
      sfxJump();
      return true;
    } else if (this.canDoubleJump && !this.hasDoubleJumped) {
      this.vy = DOUBLE_JUMP_VELOCITY;
      this.hasDoubleJumped = true;
      sfxJump();
      particles.emit(this.x + this.w / 2, this.y + this.h, 8, {
        speed: 80, life: 0.3, colors: [PHARMACY_GREEN_LIGHT, '#88ff88'], size: 3, upBias: 0
      });
      return true;
    }
    return false;
  }

  update(dt) {
    // Gravity
    this.vy += GRAVITY * dt;
    this.y += this.vy * dt;

    // Ground clamp
    if (this.y >= GROUND_Y - this.h) {
      this.y = GROUND_Y - this.h;
      this.vy = 0;
      this.grounded = true;
    }

    // Leg animation
    if (this.grounded) {
      this.legPhase += dt * 12;
    }

    // Invincibility flash
    if (this.hitFlash > 0) this.hitFlash -= dt;

    // Invincibility timer (grace period after hit or power-up)
    if (this.invincibleTimer > 0) {
      this.invincibleTimer -= dt;
      if (this.invincibleTimer <= 0) {
        this.invincible = false;
      }
    }
  }

  draw(ctx) {
    ctx.save();

    // Flash effect
    if (this.hitFlash > 0 && Math.floor(this.hitFlash * 10) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // Invincibility glow
    if (this.invincible && this.invincibleTimer > 0) {
      ctx.shadowColor = BLUE_PILL;
      ctx.shadowBlur = 15;
    }

    const isFemale = game.selectedChar === 'female';
    drawCharacter(ctx, this.x, this.y, this.w, this.grounded, this.legPhase, this.invincible, isFemale, 1.0);

    // Shield effect
    if (game.shieldHits > 0) {
      ctx.strokeStyle = '#3498db';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(this.x + this.w / 2, this.y + this.h / 2, this.w * 0.8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(52, 152, 219, 0.2)';
      ctx.fill();
    }

    ctx.restore();
  }
}

// ============================================================
// OBSTACLES
// ============================================================
class Obstacle {
  constructor() { this.active = false; }
  init(x, type, direction = -1) {
    this.active = true;
    this.type = type;
    this.direction = direction;
    this.x = x;
    this.w = type.w;
    this.h = type.h;
    // Por padrão, obstáculos ficam na calçada.
    // Carros (label "Car" ou desc "Trânsito") ficam na pista.
    this.y = GROUND_Y - this.h;
    if (type.label === "Car" || type.desc === "Trânsito") {
      const roadHeight = GROUND_OFFSET - 8;
      const roadY = GROUND_Y + 8;
      this.y = roadY + (roadHeight - this.h) / 2;

      // Vehicle model / shape variety
      const carModels = ['sedan', 'hatch', 'minivan', 'suv', 'truck', 'sport'];
      this.vehicleModel = carModels[Math.floor(Math.random() * carModels.length)];
      this.vehicleVariant = Math.floor(Math.random() * 3);
    }
    this.passed = false;
    this.legPhase = 0;
    this.honked = false;
  }
  update(dt, speed) {
    this.x += this.direction * speed * dt;

    // Buzina um pouco antes do carro entrar na tela
    if (!this.honked && (this.type.label === "Car" || this.type.desc === "Trânsito")) {
      // Detecta aproximação do lado que vai entrar
      const appearX = this.direction === -1
        ? camera.x + W / camera.zoom - 30
        : camera.x - W / camera.zoom + 30;
      if ((this.direction === -1 && this.x < appearX) || (this.direction === 1 && this.x > appearX)) {
        sfxHonk();
        this.honked = true;
      }
    }

    if (this.type.isNPC) {
      this.legPhase += dt * 10;
    }

    // Desativa quando sai da tela em qualquer direção
    const leftLimit = camera.x - W / camera.zoom - 50;
    const rightLimit = camera.x + W / camera.zoom + 50;
    if (this.x + this.w < leftLimit || this.x > rightLimit) this.active = false;
  }
  draw(ctx) {
    // Shadow para obstáculos e vírus
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(this.x + 3, this.y + 3, this.w, this.h);

      // If the obstacle is a car, draw a more detailed vehicle model
    if (this.type.label === "Car" || this.type.desc === "Trânsito") {
      drawVehicle(ctx, this.x, this.y, this.w, this.h, this.vehicleModel, this.type.color, this.direction, this.vehicleVariant);
      return; // Skip drawing label/indicator for cars
    }

    // Body
    ctx.fillStyle = this.type.color;
    ctx.beginPath();
    ctx.roundRect(this.x, this.y, this.w, this.h, 6);
    ctx.fill();

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(this.x, this.y, this.w, this.h, 6);
    ctx.stroke();

    // Difficulty indicator (colored stripe at top for harder obstacles)
    if (this.h > 48) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(this.x, this.y, this.w, 4);
    }
    if (this.h > 58) {
      ctx.fillStyle = 'rgba(255,0,0,0.2)';
      ctx.fillRect(this.x, this.y, this.w, 4);
    }

    // Label
    ctx.fillStyle = WHITE;
    ctx.font = `bold ${this.type.label.includes('\n') ? 9 : 12}px 'Plus Jakarta Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lines = this.type.label.split('\n');
    lines.forEach((line, i) => {
      ctx.fillText(line, this.x + this.w / 2, this.y + this.h / 2 + (i - (lines.length - 1) / 2) * 11);
    });
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }
}

// ============================================================
// POWER-UPS
// ============================================================
class PowerUp {
  constructor() { this.active = false; }
  init(x, type) {
    this.active = true;
    this.type = type;
    this.x = x;
    this.w = 30;
    this.h = 30;
    this.y = GROUND_Y - 80 - Math.random() * 40;
    this.bobPhase = Math.random() * Math.PI * 2;
    this.collected = false;
  }
  update(dt, speed) {
    this.x -= speed * dt;
    this.bobPhase += dt * 3;
    if (this.x + this.w < -50) this.active = false;
  }
  draw(ctx) {
    const bobY = this.y + Math.sin(this.bobPhase) * 6;

    // Glow
    ctx.shadowColor = this.type.color;
    ctx.shadowBlur = 12;

    // Circle
    ctx.fillStyle = this.type.color;
    ctx.beginPath();
    ctx.arc(this.x + this.w / 2, bobY + this.h / 2, this.w / 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Inner circle
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(this.x + this.w / 2, bobY + this.h / 2, this.w / 2 - 4, 0, Math.PI * 2);
    ctx.fill();

    // Label
    ctx.fillStyle = WHITE;
    ctx.font = `bold 13px 'Plus Jakarta Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.type.label, this.x + this.w / 2, bobY + this.h / 2);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }
  getHitbox() {
    const bobY = this.y + Math.sin(this.bobPhase) * 6;
    return { x: this.x, y: bobY, w: this.w, h: this.h };
  }
}

// ============================================================
// CAMERA SYSTEM
// ============================================================
const camera = {
  x: 0,
  y: 0,
  zoom: CAMERA_ZOOM,
  targetX: 0,
  targetY: 0,
  smoothing: 4, // higher = slower follow
};

function updateCamera(dt) {
  // Camera follows player with look-ahead (adaptive for narrow / mobile screens)
  const viewWidth = W / camera.zoom;
  const lookAhead = Math.min(CAMERA_LOOK_AHEAD, viewWidth * 0.35);
  camera.targetX = player.x + lookAhead;
  
  // Fix camera Y to keep the ground consistently at the bottom (H - GROUND_OFFSET in screen space)
  const z = camera.zoom;
  const viewCenterY = H / (2 * z);
  camera.targetY = GROUND_Y - (viewCenterY - GROUND_OFFSET / z);

  // Smooth follow
  camera.x += (camera.targetX - camera.x) * Math.min(1, camera.smoothing * dt);
  camera.y += (camera.targetY - camera.y) * Math.min(1, camera.smoothing * dt);
}

function applyCameraTransform(ctx) {
  const z = camera.zoom;
  // Center the viewport on the camera position
  const viewCenterX = W / (2 * z);
  const viewCenterY = H / (2 * z);

  ctx.save();
  ctx.scale(z, z);
  ctx.translate(-camera.x + viewCenterX, -camera.y + viewCenterY);
}

function applyBackgroundTransform(ctx) {
  const z = camera.zoom;
  const viewCenterX = W / (2 * z);
  const viewCenterY = H / (2 * z);

  ctx.save();
  ctx.scale(z, z);
  // NPCs de fundo movem-se mais devagar (paralaxe) para dar sensação de distância
  const parallaxX = camera.x * 0.9; 
  ctx.translate(-parallaxX + viewCenterX, -camera.y + viewCenterY);
}

function unapplyCameraTransform(ctx) {
  ctx.restore();
}

// ============================================================
// Object pools
const obstaclePool = Array.from({ length: 20 }, () => new Obstacle());
const powerUpPool = Array.from({ length: 10 }, () => new PowerUp());
const weaponPool = Array.from({ length: 5 }, () => new PowerUp());

class Bullet {
  constructor() { this.active = false; }
  init(x, y, angle = 0) {
    this.active = true;
    this.x = x;
    this.y = y;
    this.w = 12;
    this.h = 6;
    this.speed = 600;
    this.angle = angle;
  }
  update(dt) {
    this.x += Math.cos(this.angle) * this.speed * dt;
    this.y += Math.sin(this.angle) * this.speed * dt;
    if (this.x > camera.x + W / camera.zoom + 200 || this.y < -100 || this.y > H + 100) this.active = false;
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    // Pill-style projectile (visível mesmo em mobile)
    const primary = '#1abc9c';
    const outline = 'rgba(0,0,0,0.25)';
    const pillRadius = Math.max(6, this.h / 2);
    const pillWidth = Math.max(18, this.w);

    ctx.shadowColor = primary;
    ctx.shadowBlur = 10;

    // Body
    ctx.fillStyle = primary;
    ctx.beginPath();
    ctx.moveTo(-pillWidth / 2 + pillRadius, 0);
    ctx.lineTo(pillWidth / 2 - pillRadius, 0);
    ctx.arc(pillWidth / 2 - pillRadius, 0, pillRadius, -Math.PI/2, Math.PI/2);
    ctx.lineTo(-pillWidth / 2 + pillRadius, pillRadius);
    ctx.arc(-pillWidth / 2 + pillRadius, 0, pillRadius, Math.PI/2, -Math.PI/2);
    ctx.closePath();
    ctx.fill();

    // Divider
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -pillRadius);
    ctx.lineTo(0, pillRadius);
    ctx.stroke();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(-pillWidth * 0.15, -pillRadius * 0.4, pillRadius * 0.5, pillRadius * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Outline
    ctx.strokeStyle = outline;
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
  }
}
const bulletPool = Array.from({ length: 30 }, () => new Bullet());

function spawnBullet(x, y, angle = 0) {
  for (const b of bulletPool) {
    if (!b.active) {
      b.init(x, y, angle);
      return;
    }
  }
}

function spawnWeaponDrop(forcedX) {
  for (const w of weaponPool) {
    if (!w.active) {
      const type = WEAPON_TYPES[Math.floor(Math.random() * WEAPON_TYPES.length)];
      // Spawn ahead of camera or at forced position
      const spawnX = forcedX || (camera.x + W / camera.zoom + 100);
      w.init(spawnX, type);
      return;
    }
  }
}

class BackgroundNPC {
  constructor() { this.active = false; }

  init(x, y, speedMult, role, isFemale, direction = -1) {
    this.active = true;
    this.x = x;
    this.y = y;
    this.speedMult = speedMult;
    this.role = role; 
    this.isFemale = isFemale;
    this.direction = direction;
    this.legPhase = Math.random() * Math.PI * 2;
    this.w = (role === "car" || role === "emergencia") ? 55 : 22;
    this.h = (role === "car" || role === "emergencia") ? 28 : 52; // Altura humana ajustada para drawCharacter (aprox 52px total)
    this.hitByVirus = false;
    this.hitTimer = 0;
    this.honked = false; // Para reproduzir o som de buzina apenas uma vez

    if (role === "car") {
      const choices = ["sedan", "hatch", "minivan", "suv", "truck", "sport"];
      this.vehicleModel = choices[Math.floor(Math.random() * choices.length)];
      this.vehicleVariant = Math.floor(Math.random() * 3);
      this.vehicleColor = getRandomCarColor();
    }
    if (role === "emergencia") {
      this.vehicleModel = Math.random() < 0.5 ? "ambulance" : "police";
      this.vehicleVariant = Math.floor(Math.random() * 3);
      this.vehicleColor = "#ffffff";
    }
  }

  update(dt, baseSpeed) {
    if (!this.active) return;
    this.x += this.direction * baseSpeed * this.speedMult * dt;

    // Toca buzina um pouco antes de o carro entrar na tela
    if ((this.role === "car" || this.role === "emergencia") && !this.honked) {
      const appearX = this.direction === -1
        ? camera.x * 0.9 + W / camera.zoom - 30
        : camera.x * 0.9 - W / camera.zoom + 30;
      if ((this.direction === -1 && this.x < appearX) || (this.direction === 1 && this.x > appearX)) {
        sfxHonk();
        this.honked = true;
      }
    }

    if (!(this.role === "car" || this.role === "emergencia")) {
        this.legPhase += dt * 10 * this.speedMult;
    }

    // Remove quando sai da tela
    const leftLimit = camera.x * 0.9 - 200;
    const rightLimit = camera.x * 0.9 + W / camera.zoom + 200;
    if ((this.direction === -1 && this.x + this.w < leftLimit) || (this.direction === 1 && this.x > rightLimit)) {
      this.active = false;
    }

    if (this.hitByVirus && !["car", "emergencia"].includes(this.role)) {
      this.hitTimer -= dt;
      if (this.hitTimer <= 0) this.active = false;
    }

    if (this.x + this.w < (camera.x * 0.9) - 200) this.active = false;
  }

  draw(ctx) {
    if (!this.active) return;
    ctx.save();
    // Veículos devem ser totalmente visíveis. Pessoas podem ser um pouco transparentes para dar profundidade.
    ctx.globalAlpha = (this.role === "car" || this.role === "emergencia") ? 1.0 : 0.45;

    // Sombra
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(this.x, this.y + this.h - 2, this.w, 4);

    if (this.role === "car" || this.role === "emergencia") {
      const model = this.vehicleModel || (this.role === "emergencia" ? (Math.random() < 0.5 ? 'ambulance' : 'police') : 'sedan');
      const baseColor = this.vehicleColor || (this.role === "emergencia" ? "#ffffff" : "#34495e");
      const vehicleColor = this.hitByVirus ? "#555" : baseColor;
      const variant = this.vehicleVariant || 0;
      drawVehicle(ctx, this.x, this.y, this.w, this.h, model, vehicleColor, this.direction, variant);
    } else {
      // NPC Humano parecido com Player
      drawNPCLikeCharacter(ctx, this.x, this.y, this.role, this.isFemale, this.legPhase, 1.0);
      
      if (this.hitByVirus) {
        ctx.fillStyle = "rgba(0,255,0,0.3)";
        ctx.beginPath();
        ctx.arc(this.x + this.w / 2, this.y + 10, 10, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }
}

const bgNpcPool = Array.from({ length: 15 }, () => new BackgroundNPC());

function spawnBackgroundNPC() {
  const scene = getCurrentScene();
  const spawnChance = game.currentPhase < 3 ? 0.008 : 0.015;
  if (Math.random() > spawnChance) return;

  for (const n of bgNpcPool) {
    if (!n.active) {
      let role = "civil";
      const rnd = Math.random();

      // Lógica temática por cena (PHASE_SCENES)
      if (scene === "popular") {
        role = rnd < 0.1 ? "car" : "civil";
      } else if (scene === "privada") {
        role = rnd < 0.6 ? "bem-vestido" : (rnd < 0.75 ? "car" : "civil");
      } else if (["hospital","upa","cti","plantao","sus"].includes(scene)) {
        if (rnd < 0.3) role = "enfermeiro";
        else if (rnd < 0.6) role = "medico";
        else if (rnd < 0.85) role = "emergencia"; // Ambulâncias frequentes
        else role = "civil";
      } else if (["rua","noite"].includes(scene)) {
        if (rnd < 0.4) role = "car";
        else if (rnd < 0.5) role = "policial";
        else role = "civil";
      } else if (["crise","caos"].includes(scene)) {
        if (rnd < 0.3) role = "policial";
        else if (rnd < 0.7) role = "emergencia"; // Ambulâncias em abundância
        else if (rnd < 0.9) role = "car";
        else role = "civil";
      }

      const isVehicle = (role === "car" || role === "emergencia");
      const isFemale = Math.random() > 0.5;
      
      const npcHeight = isVehicle ? 28 : 52;
      // Veículos ficam centralizados na largura da pista (abaixo da calçada); pedestres na calçada
      const roadHeight = GROUND_OFFSET - 8;
      const roadY = GROUND_Y + 8;
      const vehicleY = roadY + (roadHeight - npcHeight) / 2;
      const finalY = isVehicle ? vehicleY : (GROUND_Y - npcHeight);
      
      const speedMult = isVehicle ? (0.7 + Math.random() * 0.3) : (0.3 + Math.random() * 0.2);
      // Spawn à esquerda ou à direita para simular tráfego bidirecional
      const direction = isVehicle ? (Math.random() < 0.5 ? -1 : 1) : -1;
      const spawnX = direction === -1
        ? (camera.x * 0.9) + W / camera.zoom + 100
        : (camera.x * 0.9) - W / camera.zoom - 100;
      
      n.init(spawnX, finalY, speedMult, role, isFemale, direction);
      return;
    }
  }
}

const player = new Player();

function getPhase() {
  for (let i = PHASES.length - 1; i >= 0; i--) {
    if (game.score >= PHASES[i].minScore) return i;
  }
  return 0;
}

function getSpeed() {
  const phase = PHASES[game.currentPhase] || PHASES[0];
  const distFactor = 1 + Math.log(1 + game.distance / 6000) * 0.7;
  const base = BASE_SPEED * phase.speedMult * distFactor;
  const speedBoost = game.activePowerUp === "speedBoost" ? 1.4 : 1.0;
  return Math.min(base * speedBoost, MAX_SPEED);
}

function spawnObstacle() {
  const distMeters = game.distance / 10;

  for (const o of obstaclePool) {
    if (!o.active) {
      // Pick obstacle type based on current phase (but allow cars always)
      const phaseTypes = OBSTACLE_TYPES_BY_PHASE[game.currentPhase] || OBSTACLE_TYPES_BY_PHASE[0];
      let type = phaseTypes[Math.floor(Math.random() * phaseTypes.length)];
      if (Math.random() < 0.35) {
        // Create a new car instance with varied color and slight size variance
        type = {
          ...CAR_OBSTACLE,
          color: getRandomCarColor(),
          w: CAR_OBSTACLE.w + (Math.random() * 20 - 10),
          h: CAR_OBSTACLE.h + (Math.random() * 8 - 4),
        };
      }

      // Determine spawn direction for cars (both ways on the road)
      let direction = -1;
      let spawnX = camera.x + W / camera.zoom + 50;
      if (type === CAR_OBSTACLE && Math.random() < 0.5) {
        direction = 1;
        spawnX = camera.x - W / camera.zoom - 50;
      }

      // Do not spawn if another obstacle is too close to this spawn point
      const minGapPx = 140; // keep at least ~5m between obstacles (in world units)
      const isTooClose = obstaclePool.some(o => o.active && Math.abs(o.x - spawnX) < minGapPx);
      if (isTooClose) {
        // Avoid getting stuck trying to spawn on every frame: delay next spawn attempt a little.
        game.nextObstacleDistanceMeters = distMeters + 3 + Math.random() * 3;
        return; // skip spawn to avoid clusters
      }

      o.init(spawnX, type, direction);

      // ESTRATÉGICO: Se for um Inimigo (patógeno), tem chance alta de spawnar uma arma ou power-up logo antes
      if (type.role === "pathogen" && Math.random() < 0.85) {
        const helperX = spawnX - 160; // Um pouco antes do inimigo para dar tempo de reação
        if (Math.random() > 0.4) {
            spawnWeaponDrop(helperX);
        } else {
            const pType = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
            spawnPowerUp(helperX, pType);
        }
      }
      return;
    }
  }

  // If we couldn't find an available obstacle slot (pool full), delay the next spawn attempt
  game.nextObstacleDistanceMeters = distMeters + 3 + Math.random() * 3;
}

function spawnPowerUp(forcedX, forcedType) {
  for (const p of powerUpPool) {
    if (!p.active) {
      const type = forcedType || POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
      const spawnX = forcedX || (camera.x + W / camera.zoom + 50);
      p.init(spawnX, type);
      return;
    }
  }
}

function aabbCollision(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function activatePowerUp(type) {
  game.activePowerUp = type.effect;
  game.powerUpTimer = type.duration / 1000;
  if (type.effect === 'doubleJump') {
    player.canDoubleJump = true;
  } else if (type.effect === 'invincible') {
    player.invincible = true;
    player.invincibleTimer = type.duration / 1000;
  } else if (type.effect === 'shield') {
    game.shieldHits = (game.shieldHits || 0) + 1;
    game.activePowerUp = null; // Instant effect, no timer
  } else if (type.effect === 'bullet') {
    // Faster fire rate while active
    game.fireCooldown = 0.12;
  } else if (type.effect === 'spray') {
    // Spray mode: wider spread and faster fire rate
    game.fireCooldown = 0.18;
  } else if (type.effect === 'pulse') {
    // Pulse limpa tudo na tela imediatamente
    for (const o of obstaclePool) {
      if (o.active && (o.type.diseaseId || o.type.label.includes("$$$"))) {
        o.active = false;
        game.score += 150;
        particles.emit(o.x + o.w / 2, o.y + o.h / 2, 20, {
          speed: 150, life: 0.6, colors: [GOLD, WHITE], size: 5
        });
      }
    }
    sfxShoot(); // Som de pulso
    game.activePowerUp = null;
  } else if (type.effect === 'scoreBoost') {
    game.score += 1000; // Bônus imediato da vacina
    particles.emit(player.x + player.w/2, player.y, 25, {
        speed: 180, life: 0.8, colors: ["#00bcd4", WHITE], size: 4
    });
  } else if (type.effect === 'magnet') {
    // Efeito visual inicial
    particles.emit(player.x + player.w/2, player.y + player.h/2, 15, {
        speed: 100, life: 0.5, colors: ["#e91e63", WHITE], size: 3
    });
  }
}

function hitObstacle(o) {
  if (player.invincible) {
    player.hitFlash = 0;
    return;
  }

  if (game.shieldHits && game.shieldHits > 0) {
    game.shieldHits--;
    player.hitFlash = 0.5;
    sfxHit();
    return;
  }

  if (o && o.diseaseId && DISEASES[o.diseaseId]) {
    game.lastDisease = DISEASES[o.diseaseId];
  } else {
    game.lastDisease = null;
  }

  game.lives--;
  player.hitFlash = 1.5;
  player.invincible = true;
  player.invincibleTimer = 0.8; // small grace period after hit
  sfxHit();
  particles.emit(player.x + player.w / 2, player.y + player.h / 2, 15, {
    speed: 200,
    life: 0.5,
    colors: [RED, "#ff8888", "#ffaaaa"],
    size: 5,
    upBias: 100,
  });

  if (game.lives <= 0) {
    gameOver();
  }
}

function gameOver() {
  game.state = 'gameover';
  game.gameOverAlpha = 0;
  stopMusic();
  sfxGameOver();

  game.highScore = Math.max(game.highScore || 0, game.score || 0);
  game.bestScore = Math.max(game.bestScore || 0, Math.floor(game.score || 0));
  game.bestDistance = Math.max(game.bestDistance || 0, Math.floor(game.distance || 0));
  game.furthestPhase = Math.max(game.furthestPhase || 0, game.currentPhase || 0);

  saveProgress();
  game.pendingLeaderboard = true;
}

function victory() {
  game.state = 'victory';
  game.victoryAlpha = 0;
  stopMusic();
  sfxMilestone();

  game.highScore = Math.max(game.highScore || 0, game.score || 0);
  game.bestScore = Math.max(game.bestScore || 0, Math.floor(game.score || 0));
  game.bestDistance = Math.max(game.bestDistance || 0, Math.floor(game.distance || 0));
  game.furthestPhase = Math.max(game.furthestPhase || 0, game.currentPhase || 0);

  saveProgress();
  game.pendingLeaderboard = true;
}

function resetGame() {
  game.state = 'playing';
  game.score = 0;
  game.distance = 0;
  game.lives = 3;
  game.speed = BASE_SPEED;
  game.currentPhase = 0;
  game.lastMilestone = 0;
  game.activePowerUp = null;
  game.powerUpTimer = 0;
  game.obstacleSpawnCooldown = 1.2;
  game.nextObstacleDistanceMeters = 0;
  game.powerUpSpawnCooldown = 3;
  game.weaponSpawnCooldown = 5;
  game.phaseBannerTimer = 2.5;
  game.pendingLeaderboard = false;
  game.coins = 0;
  game.shieldHits = 0;
  game.bulletTimer = 0;
  game.fireCooldown = 0.25;

  player.reset();
  player.canDoubleJump = true; // Double jump is always available
  player.invincible = false;

  for (const o of obstaclePool) o.active = false;
  for (const p of powerUpPool) p.active = false;
  if (typeof bgNpcPool !== "undefined") {
    for (const n of bgNpcPool) n.active = false;
  }

  camera.x = player.x + CAMERA_LOOK_AHEAD;
  camera.y = player.y + player.h / 2;

  initAudio();
  if (audioCtx) audioCtx.resume();
  startMusic();
  saveProgress();
}

const lbOverlay = document.getElementById('leaderboard-overlay');
const lbBody = document.getElementById('lb-body');
const lbEmpty = document.getElementById('lb-empty');
const lbSubmitForm = document.getElementById('lb-submit-form');
const lbYourScore = document.getElementById('lb-your-score');
const lbNameInput = document.getElementById('lb-name-input');
const lbBtnSubmit = document.getElementById('lb-btn-submit');
const lbBtnSkip = document.getElementById('lb-btn-skip');
const lbClose = document.getElementById('lb-close');
const lbSuccess = document.getElementById('lb-success');

let leaderboardShowing = false;
let leaderboardScoreToSubmit = 0;
let leaderboardDistToSubmit = 0;

async function showLeaderboard(scoreToSubmit, distToSubmit) {
  leaderboardShowing = true;
  leaderboardScoreToSubmit = scoreToSubmit || 0;
  leaderboardDistToSubmit = distToSubmit || 0;

  lbOverlay.classList.add('visible');
  lbSuccess.classList.remove('visible');

  // Load existing scores
  const scores = await fetchLeaderboard();
  lbBody.innerHTML = '';

  if (scores.length === 0) {
    lbEmpty.style.display = 'block';
  } else {
    lbEmpty.style.display = 'none';
    scores.forEach((s, i) => {
      const tr = document.createElement('tr');
      const rankClass = i < 3 ? ` lb-rank-${i + 1}` : '';
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
      tr.innerHTML = `
        <td class="lb-rank${rankClass}">${medal}</td>
        <td class="lb-name">${escapeHtml(s.name)} ${s.character === 'female' ? '👩' : '👨'}</td>
        <td class="lb-score">${Math.floor(s.score).toLocaleString('pt-BR')}</td>
      `;
      lbBody.appendChild(tr);
    });
  }

  // Show submit form if there's a score
  if (scoreToSubmit > 0) {
    lbSubmitForm.classList.add('visible');
    lbYourScore.textContent = Math.floor(scoreToSubmit).toLocaleString('pt-BR') + ' pontos';
    lbNameInput.value = '';
    lbNameInput.focus();
  } else {
    lbSubmitForm.classList.remove('visible');
  }
}

function hideLeaderboard() {
  lbOverlay.classList.remove('visible');
  leaderboardShowing = false;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

lbClose.addEventListener('click', hideLeaderboard);
lbBtnSkip.addEventListener('click', hideLeaderboard);

lbBtnSubmit.addEventListener('click', async () => {
  const name = lbNameInput.value.trim();
  if (!name) { lbNameInput.focus(); return; }

  lbBtnSubmit.textContent = 'Salvando...';
  lbBtnSubmit.disabled = true;

  const result = await submitScore(
    name,
    leaderboardScoreToSubmit,
    leaderboardDistToSubmit,
    PHASES[game.currentPhase]?.name || '',
    game.selectedChar
  );

  lbBtnSubmit.textContent = 'Salvar';
  lbBtnSubmit.disabled = false;
  lbSubmitForm.classList.remove('visible');

  if (result) {
    lbSuccess.textContent = `Salvo! Você está em ${result.rank}º lugar!`;
    lbSuccess.classList.add('visible');
    // Refresh leaderboard
    const scores = await fetchLeaderboard();
    lbBody.innerHTML = '';
    scores.forEach((s, i) => {
      const tr = document.createElement('tr');
      const rankClass = i < 3 ? ` lb-rank-${i + 1}` : '';
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
      tr.innerHTML = `
        <td class="lb-rank${rankClass}">${medal}</td>
        <td class="lb-name">${escapeHtml(s.name)} ${s.character === 'female' ? '👩' : '👨'}</td>
        <td class="lb-score">${Math.floor(s.score).toLocaleString('pt-BR')}</td>
      `;
      lbBody.appendChild(tr);
    });
    if (scores.length > 0) lbEmpty.style.display = 'none';
  } else {
    lbSuccess.textContent = 'Erro ao salvar. Tente novamente.';
    lbSuccess.classList.add('visible');
  }

  e.stopPropagation(); // prevent game input

// ============================================================
let debugVisible = false;
let _fpsFrames = 0, _fpsLast = performance.now(), _fps = 0, _frametime = 0, _prevFrame = 0;

document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyD') debugVisible = !debugVisible;
  if (e.code === 'KeyP' || e.code === 'Escape') {
    if (game.state === 'playing') pauseGame();
    else if (game.state === 'paused') resumeGame();
  }
});

function updateDebug() {
  _fpsFrames++;
  const now = performance.now();
  _frametime = now - (_prevFrame || now);
  _prevFrame = now;
  if (now - _fpsLast >= 1000) {
    _fps = (_fpsFrames * 1000) / (now - _fpsLast);
    _fpsFrames = 0;
    _fpsLast = now;
  }
}

function drawDebug(ctx) {
  if (!debugVisible) return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, 260, 58);
  ctx.font = '11px monospace';
  ctx.fillStyle = _fps < 30 ? '#f44' : '#0f0';
  ctx.fillText(`FPS:${_fps.toFixed(0)} Frame:${_frametime.toFixed(1)}ms Zoom:${camera.zoom.toFixed(1)}x`, 6, 14);
  ctx.fillText(`Cam:(${Math.round(camera.x)},${Math.round(camera.y)}) Phase:${game.currentPhase}`, 6, 28);
  ctx.fillText(`Objs:${obstaclePool.filter(o=>o.active).length} PU:${powerUpPool.filter(p=>p.active).length} Ptcl:${particles.pool.filter(p=>p.active).length}`, 6, 42);
  ctx.restore();
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  if (game.state === 'title') {
    game.titlePhase += dt;
    game.titleAlpha = Math.min(1, game.titleAlpha + dt * 2);
    bgLayers.forEach(l => l.update(dt, 80));
    particles.update(dt);

    if (Input.wantsJump() || Input.justPressed['Enter']) {
      game.state = 'charSelect';
      game.charSelectAlpha = 0;
      initAudio();
      if (audioCtx) audioCtx.resume();
    }
    Input.endFrame();
    return;
  }

  if (game.state === 'charSelect') {
    game.charSelectAlpha = Math.min(1, game.charSelectAlpha + dt * 3);
    game.titlePhase += dt;
    bgLayers.forEach(l => l.update(dt, 80));
    particles.update(dt);
    Input.endFrame();
    return;
  }

  if (game.state === 'gameover') {
    game.gameOverAlpha = Math.min(1, game.gameOverAlpha + dt * 3);
    particles.update(dt);

    // Show leaderboard after overlay fades in
    if (game.pendingLeaderboard && game.gameOverAlpha > 0.8 && !leaderboardShowing) {
      game.pendingLeaderboard = false;
      showLeaderboard(game.score, game.distance);
    }

    if (!leaderboardShowing && (Input.wantsJump() || Input.justPressed['Enter']) && game.gameOverAlpha > 0.5) {
      resetGame();
    }
    Input.endFrame();
    return;
  }

  if (game.state === 'victory') {
    game.victoryAlpha = Math.min(1, game.victoryAlpha + dt * 2);
    particles.update(dt);

    // Show leaderboard after overlay fades in
    if (game.pendingLeaderboard && game.victoryAlpha > 0.8 && !leaderboardShowing) {
      game.pendingLeaderboard = false;
      showLeaderboard(game.score, game.distance);
    }

    if (!leaderboardShowing && (Input.wantsJump() || Input.justPressed['Enter']) && game.victoryAlpha > 0.5) {
      resetGame();
    }
    Input.endFrame();
    return;
  }

  if (game.state === 'paused') {
    // Resume with P/Escape or touch/click
    if (Input.wantsJump() || Input.justPressed['KeyP'] || Input.justPressed['Escape']) {
      resumeGame();
    }
    Input.endFrame();
    return;
  }

  // ---- PLAYING ----
  game.speed = getSpeed();
  const spd = game.speed;

  // distância controla fase (metros virtuais)
  const oldScore = game.score;
  game.distance += spd * dt;
  const scoreMult = game.activePowerUp === 'scoreBoost' ? 0.04 : 0.02;
  game.score += spd * dt * scoreMult;

  // 1 moeda a cada 500 pontos
  const oldStep = Math.floor(oldScore / 500);
  const newStep = Math.floor(game.score / 500);
  if (newStep > oldStep) {
    awardCoins(newStep - oldStep);
  }

  // troca de fase linear por distância
  for (let i = 0; i < PHASES.length; i++) {
    if (game.distance >= PHASES[i].minDist && game.distance < PHASES[i].maxDist) {
      if (game.currentPhase !== i) {
        game.currentPhase = i;
        game.phaseBannerTimer = 2.5;
        game.hintTimer = 3;
        game.furthestPhase = Math.max(game.furthestPhase || 0, i);
        sfxMilestone();
        generateStorefronts(); // Regenerate storefronts for new scene
        saveProgress();
      }
      break;
    }
  }

  const phase = PHASES[game.currentPhase] || PHASES[0];

  // Power-up timer
  if (game.activePowerUp) {
    game.powerUpTimer -= dt;
    if (game.powerUpTimer <= 0) {
      // Double jump is always enabled now; power-up just grants a temporary visual / effect.
      if (game.activePowerUp === 'invincible') { player.invincible = false; player.invincibleTimer = 0; }
      if (game.activePowerUp === 'bullet' || game.activePowerUp === 'spray') {
        game.fireCooldown = 0.25; // reset to default fire rate
      }
      game.activePowerUp = null;
    }
  }

  // Hint timer
  if (game.hintTimer > 0) game.hintTimer -= dt;

  // Jump input
  if (Input.wantsJump()) {
    player.jump();
  }

  // Shooting input (basic function)
  game.bulletTimer = (game.bulletTimer || 0) - dt;
  if (Input.wantsShoot() && game.bulletTimer <= 0) {
    spawnBullet(player.x + player.w, player.y + player.h / 2, 0);
    sfxShoot();
    game.bulletTimer = game.fireCooldown || 0.25; // rate of fire
  }

  // Player update
  player.update(dt);

  // Camera update
  updateCamera(dt);

  // Background
  bgLayers.forEach(l => l.update(dt, spd));

  const scene = getCurrentScene();

  // spawn de obstáculos com espaçamento em metros (2-10m entre cada)
  const distMeters = game.distance / 10;
  if (game.nextObstacleDistanceMeters <= 0) {
    game.nextObstacleDistanceMeters = distMeters + 2 + Math.random() * 8;
  }
  if (distMeters >= game.nextObstacleDistanceMeters) {
    spawnObstacle();
    game.nextObstacleDistanceMeters = distMeters + 5 + Math.random() * 5;
  }

  // Spawn power-ups
  game.powerUpSpawnCooldown -= dt;
  if (game.powerUpSpawnCooldown <= 0 && Math.random() < phase.powerUpRate * 2) {
    spawnPowerUp();
    const minCooldown = Math.max(3, 8 - game.currentPhase * 1.5);
    const maxCooldown = Math.max(5, 14 - game.currentPhase * 2);
    game.powerUpSpawnCooldown = minCooldown + Math.random() * (maxCooldown - minCooldown);
  }

  // Spawn weapons
  game.weaponSpawnCooldown -= dt;
  if (game.weaponSpawnCooldown <= 0) {
    if (typeof spawnWeaponDrop === 'function') spawnWeaponDrop();
    const scene = getCurrentScene();
    const baseCd = (scene === "crise" || scene === "caos") ? 12 : 18;
    game.weaponSpawnCooldown = baseCd + Math.random() * 6;
  }

  // Background NPCs
  spawnBackgroundNPC();
  for (const n of bgNpcPool) n.update(dt, spd);

  // Update obstacles - deactivate if far behind camera
  const viewLeft = camera.x - W / camera.zoom;
  for (const o of obstaclePool) {
    if (!o.active) continue;
    o.update(dt, spd);

    // Check collision
    const playerBox = { x: player.x + 4, y: player.y + 4, w: player.w - 8, h: player.h - 8 };
    if (aabbCollision(playerBox, o)) {
      hitObstacle(o);
    }

    // vírus acertando NPCs
    if (o.diseaseId) {
      for (const n of bgNpcPool) {
        if (!n.active || n.hitByVirus || n.role === "car") continue;
        const overlap =
          n.x < o.x + o.w &&
          n.x + n.w > o.x &&
          n.y < o.y + o.h &&
          n.y + n.h > o.y + o.h * 0.3;
        if (overlap) {
          n.hitByVirus = true;
          n.hitTimer = 1.0;
        }
      }
    }

    // Score for passing
    if (!o.passed && o.x + o.w < player.x) {
      o.passed = true;
      game.score += 1;
    }

    // Deactivate if far behind camera view
    if (o.x + o.w < viewLeft - 100) o.active = false;
  }

  // Update power-ups
  for (const p of powerUpPool) {
    if (!p.active) continue;
    p.update(dt, spd);

    // Efeito Magneto
    if (game.activePowerUp === 'magnet') {
      const dx = player.x - p.x;
      const dy = (player.y + player.h/2) - (p.y + p.h/2);
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 300) {
        p.x += (dx / dist) * 400 * dt;
        p.y += (dy / dist) * 400 * dt;
      }
    }

    const playerBox = { x: player.x + 2, y: player.y + 2, w: player.w - 4, h: player.h - 4 };
    const puBox = p.getHitbox();
    if (aabbCollision(playerBox, puBox)) {
      p.active = false;
      game.score += 50;
      activatePowerUp(p.type);
      sfxCollect();
      particles.emit(puBox.x + puBox.w / 2, puBox.y + puBox.h / 2, 20, {
        speed: 150, life: 0.6, colors: [p.type.color, WHITE, GOLD], size: 4, upBias: 80
      });
    }

    if (p.x + p.w < viewLeft - 100) p.active = false;
  }

  // Update weapons
  for (const w of weaponPool) {
    if (!w.active) continue;
    w.update(dt, spd);

    // Efeito Magneto para armas
    if (game.activePowerUp === 'magnet') {
      const dx = player.x - w.x;
      const dy = (player.y + player.h/2) - (w.y + w.h/2);
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 300) {
        w.x += (dx / dist) * 400 * dt;
        w.y += (dy / dist) * 400 * dt;
      }
    }

    const playerBox = { x: player.x + 2, y: player.y + 2, w: player.w - 4, h: player.h - 4 };
    const wBox = w.getHitbox();
    if (aabbCollision(playerBox, wBox)) {
      w.active = false;
      game.score += 50;
      activatePowerUp(w.type);
      sfxCollect();
      particles.emit(wBox.x + wBox.w / 2, wBox.y + wBox.h / 2, 20, {
        speed: 150, life: 0.6, colors: [w.type.color, WHITE, GOLD], size: 4, upBias: 80
      });
    }
    if (w.x + w.w < viewLeft - 100) w.active = false;
  }

  // Update bullets
  for (const b of bulletPool) {
    if (!b.active) continue;
    b.update(dt);
    
    // Check bullet vs obstacle collision
    for (const o of obstaclePool) {
      if (o.active && aabbCollision(b, o)) {
        b.active = false; // Bullet always disappears on hit

        // Destroy any obstacle hit by the bullet
        o.active = false;
        game.score += 100;
        sfxHit();
        particles.emit(o.x + o.w / 2, o.y + o.h / 2, 10, {
          speed: 100, life: 0.4, colors: [o.type.color, WHITE], size: 3
        });
        break;
      }
    }
  }

  // Particles
  particles.update(dt);

  // Milestones
  const curMilestone = Math.floor(game.score / 10000);
  if (curMilestone > game.lastMilestone) {
    game.lastMilestone = curMilestone;
    sfxMilestone();
    particles.emit(player.x + player.w / 2, player.y - 30, 30, {
      speed: 250, life: 1.0, colors: [PHARMACY_GREEN, GOLD, WHITE], size: 5, upBias: 120
    });
  }

  // Victory check
  if (game.score >= 100000) {
    victory();
  }

  Input.endFrame();
}

function drawGround(ctx) {
  // Sidewalk
  ctx.fillStyle = SIDEWALK_COLOR;
  ctx.fillRect(-W, GROUND_Y, W * 5, 8);

  // Sidewalk Cracks and Detail
  ctx.strokeStyle = "rgba(0,0,0,0.1)";
  ctx.lineWidth = 1;
  for (let i = -W; i < W * 4; i += 120) {
    const x = i - (game.distance % 120);
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(x, GROUND_Y + 8);
    ctx.stroke();
  }

  // Road
  ctx.fillStyle = GROUND_COLOR;
  ctx.fillRect(-W, GROUND_Y + 8, W * 5, GROUND_OFFSET - 8);

  // Grass patches near sidewalk
  ctx.fillStyle = "#2d5a27";
  for (let i = -W; i < W * 4; i += 200) {
    const x = i - (game.distance % 200);
    ctx.fillRect(x + 20, GROUND_Y + 8, 15, 3);
    ctx.fillRect(x + 110, GROUND_Y + 8, 10, 2);
  }

  // Road lines
  ctx.setLineDash([20, 15]);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const lineOffset = (game.distance * 0.5) % 35;
  ctx.moveTo(-lineOffset - W, GROUND_Y + GROUND_OFFSET / 2 + 4);
  ctx.lineTo(W * 4, GROUND_Y + GROUND_OFFSET / 2 + 4);
  ctx.stroke();
  ctx.setLineDash([]);
}

function formatNumber(n) {
  return Math.floor(n).toLocaleString('pt-BR');
}

  ctx.arc(pauseX, pauseY, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = WHITE;
  ctx.fillRect(pauseX - 6, pauseY - 8, 4, 16);
  ctx.fillRect(pauseX + 2, pauseY - 8, 4, 16);

  ctx.fill();
  ctx.fillStyle = WHITE;

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(audioMuted ? '🔇' : '🔊', muteX, muteY);

  // Leaderboard button (below mute)
  const lbBtnX = W - 44;
  const lbBtnY = 72;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();

  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏆', lbBtnX, lbBtnY);

    const puNames = { doubleJump: 'Pulo Duplo', speedBoost: 'Velocidade', invincible: 'Invencível', bullet: 'Tiro Ativo' };
    const puColors = { doubleJump: PHARMACY_GREEN, speedBoost: GOLD, invincible: BLUE_PILL, bullet: GOLD };
    const barW = 140;
    const barH = 8;
    const barX = W / 2 - barW / 2;
    const barY = 58;
    
    // Determine maxTime for this powerup
    let maxTime = 3; // Default
    if (game.activePowerUp === 'doubleJump') maxTime = 5;
    else if (game.activePowerUp === 'invincible') maxTime = 4;
    else if (game.activePowerUp === 'bullet') maxTime = 6;
    else if (game.activePowerUp === 'speedBoost') maxTime = 3;

    const pct = Math.min(1, game.powerUpTimer / maxTime);

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(barX - 4, barY - 16, barW + 8, 30);

    ctx.textAlign = 'center';

    ctx.fillStyle = '#3498db';
    ctx.textAlign = 'right';

    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, game.hintTimer)})`;
    ctx.textAlign = 'center';

  // Mobile jump zone indicator

    ctx.roundRect(W * 0.05, H * 0.55, W * 0.9, H * 0.38, 16);
    ctx.fill();
