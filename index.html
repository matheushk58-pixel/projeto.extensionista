    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.textAlign = 'center';
    ctx.fillText('TOQUE PARA PULAR', W / 2, H * 0.95);
    ctx.textAlign = 'left';

    // Shoot button
    const btnR = 40 * scale;
    const btnX = W - 60;
    const btnY = H - 80;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.arc(btnX, btnY, btnR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = `700 ${Math.max(14, 16 * scale)}px 'Plus Jakarta Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💊', btnX, btnY);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }
}

function drawHeart(ctx, x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  const s = size / 20;
  ctx.beginPath();
  ctx.moveTo(0, 3 * s);
  ctx.bezierCurveTo(-5 * s, -5 * s, -13 * s, 0, 0, 12 * s);
  ctx.bezierCurveTo(13 * s, 0, 5 * s, -5 * s, 0, 3 * s);
  ctx.fill();
  ctx.restore();
}

function drawTitleScreen(ctx) {
  bgLayers.forEach(l => l.draw(ctx));
  drawGround(ctx);

  const alpha = game.titleAlpha;
  ctx.save();
  ctx.globalAlpha = alpha;

  // Overlay - stronger for text readability
  ctx.fillStyle = 'rgba(0, 15, 30, 0.65)';
  ctx.fillRect(0, 0, W, H);

  // Title
  const titleSize = Math.min(48, W * 0.08) * scale;
  ctx.font = `800 ${titleSize}px 'Plus Jakarta Sans', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = PHARMACY_GREEN_LIGHT;
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.fillText('DROGARIA RUNNER', W / 2, H * 0.3);
  ctx.shadowBlur = 0;

  // Cross icon
  const crossSize = 24 * scale;
  ctx.fillStyle = PHARMACY_GREEN;
  const crossX = W / 2;
  const crossY = H * 0.3 + titleSize * 0.7;

  // Description
  ctx.font = `400 ${Math.min(14, W * 0.024) * scale}px 'Plus Jakarta Sans', sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 4;
  const descY = H * 0.50;
  ctx.fillText('Desvie dos obstáculos e colete power-ups', W / 2, descY);
  ctx.fillText('para alcançar o acesso à saúde!', W / 2, descY + 22 * scale);
  ctx.shadowBlur = 0;

  // CTA with dark backdrop
  const ctaY = H * 0.62;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.roundRect(W / 2 - 160, ctaY - 24, 320, 42, 8);
  ctx.fill();
  const pulse = 0.8 + Math.sin(game.titlePhase * 3) * 0.2;
  ctx.globalAlpha = alpha * pulse;
  ctx.font = `700 ${Math.min(22, W * 0.04) * scale}px 'Plus Jakarta Sans', sans-serif`;
  ctx.fillStyle = WHITE;
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 6;
  const ctaText = game.isMobile ? '▶ Toque para Jogar' : '▶ Clique para Jogar';
  ctx.fillText(ctaText, W / 2, ctaY);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = alpha;

  // Controls info
  if (!game.isMobile) {
    ctx.font = `400 ${Math.min(11, W * 0.02) * scale}px 'Plus Jakarta Sans', sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 4;
    ctx.fillText('ESPAÇO / ↑ = Pular  |  D = Debug  |  M = Mudo', W / 2, ctaY + 30);
    ctx.shadowBlur = 0;
  }

  // Legend - with dark backdrop panel
  const legendY = H * 0.78;
  const legendFontSize = Math.max(9, 10 * scale);
  ctx.font = `600 ${legendFontSize}px 'Plus Jakarta Sans', sans-serif`;
  const items = [
    { label: '$$$ Preço Alto', color: '#cc3333' },
    { label: 'FP Farm. Popular', color: PHARMACY_GREEN },
    { label: '$ Desconto', color: GOLD },
    { label: '💊 Genérico', color: BLUE_PILL },
  ];
  // Measure actual text widths for proper spacing
  const iconW = 12; // color square + gap
  const itemGap = 18;
  const itemWidths = items.map(item => iconW + ctx.measureText(item.label).width);
  const totalLegendW = itemWidths.reduce((a, b) => a + b, 0) + itemGap * (items.length - 1);
  const startX = W / 2 - totalLegendW / 2;

  // Legend backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.roundRect(startX - 12, legendY - 16, totalLegendW + 24, 30, 6);
  ctx.fill();

  let ix = startX;
  items.forEach((item, i) => {
    ctx.fillStyle = item.color;
    ctx.fillRect(ix, legendY - 5, 8, 8);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.textAlign = 'left';
    ctx.fillText(item.label, ix + 12, legendY + 3);
    ix += itemWidths[i] + itemGap;
  });
  ctx.textAlign = 'left';

  ctx.restore();
}

// Character selection screen hitboxes (stored for click detection)
let charSelectBoxes = { male: null, female: null };
let pauseMenuButtons = { resume: null, quit: null };

function pauseGame() {
  if (game.state !== 'playing') return;
  game.state = 'paused';
  stopMusic();
}

function resumeGame() {
  if (game.state !== 'paused') return;
  game.state = 'playing';
  startMusic();
}

function goToTitle() {
  game.state = 'title';
  game.titleAlpha = 0;
  game.titlePhase = 0;
  stopMusic();
}

function drawCharSelectScreen(ctx) {
  bgLayers.forEach(l => l.draw(ctx));
  drawGround(ctx);

  ctx.save();
  ctx.globalAlpha = game.charSelectAlpha;

  // Dark overlay
  ctx.fillStyle = 'rgba(0, 15, 30, 0.75)';
  ctx.fillRect(0, 0, W, H);

  // Title
  const titleSize = Math.min(32, W * 0.06) * scale;
  ctx.font = `800 ${titleSize}px 'Plus Jakarta Sans', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = PHARMACY_GREEN_LIGHT;
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.fillText('ESCOLHA SEU PERSONAGEM', W / 2, H * 0.18);
  ctx.shadowBlur = 0;

  // Character cards
  const cardW = Math.min(180, W * 0.35);
  const cardH = cardW * 1.2;
  const gap = Math.min(60, W * 0.05);
  const totalCardW = cardW * 2 + gap;
  const startCardX = W / 2 - totalCardW / 2;
  const cardY = H * 0.25;

  const chars = [
    { key: 'male', label: 'Masculino', x: startCardX },
    { key: 'female', label: 'Feminino', x: startCardX + cardW + gap },
  ];

  // Animated leg phase for previews
  const previewLeg = game.titlePhase * 8;

  chars.forEach(ch => {
    const isSelected = game.selectedChar === ch.key;
    const isHover = game.charHover === ch.key;

    ctx.save();
    // Card background
    const borderColor = isSelected ? PHARMACY_GREEN_LIGHT : (isHover ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.15)');
    const bgColor = isSelected ? 'rgba(34,139,34,0.2)' : 'rgba(255,255,255,0.05)';

    ctx.fillStyle = bgColor;
    ctx.beginPath();
    ctx.roundRect(ch.x, cardY, cardW, cardH, 12);
    ctx.fill();

    ctx.strokeStyle = borderColor;
    ctx.lineWidth = isSelected ? 3 : 1.5;
    ctx.beginPath();
    ctx.roundRect(ch.x, cardY, cardW, cardH, 12);
    ctx.stroke();

    // Check mark for selected
    if (isSelected) {
      ctx.fillStyle = PHARMACY_GREEN;
      ctx.beginPath();
      ctx.arc(ch.x + cardW - 16, cardY + 16, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = WHITE;
      ctx.font = `bold 14px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✓', ch.x + cardW - 16, cardY + 16);
      ctx.textBaseline = 'alphabetic';
    }

    // Character preview (drawn at 2x scale, centered in card)
    const previewScale = 2.2;
    const charPreviewW = PLAYER_W * previewScale;
    const charPreviewX = ch.x + cardW / 2 - charPreviewW / 2;
    const charPreviewY = cardY + cardH * 0.15;
    drawCharacter(ctx, charPreviewX, charPreviewY, PLAYER_W * previewScale, true, previewLeg, false, ch.key === 'female', previewScale);

    // Label
    ctx.font = `700 ${Math.min(16, cardW * 0.1)}px 'Plus Jakarta Sans', sans-serif`;
    ctx.fillStyle = isSelected ? PHARMACY_GREEN_LIGHT : WHITE;
    ctx.textAlign = 'center';
    ctx.fillText(ch.label, ch.x + cardW / 2, cardY + cardH - 20);

    // Store hitbox for click detection
    charSelectBoxes[ch.key] = { x: ch.x, y: cardY, w: cardW, h: cardH };

    ctx.restore();
  });

  // Play button
  const btnY = cardY + cardH + Math.min(30, H * 0.04);
  const btnW = Math.min(260, W * 0.5);
  const btnH = Math.min(50, H * 0.07);
  const btnX = W / 2 - btnW / 2;

  const pulse = 0.85 + Math.sin(game.titlePhase * 3) * 0.15;
  ctx.globalAlpha = game.charSelectAlpha * pulse;
  ctx.fillStyle = PHARMACY_GREEN;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 10);
  ctx.fill();

  ctx.fillStyle = WHITE;
  ctx.font = `700 ${Math.min(20, btnH * 0.45)}px 'Plus Jakarta Sans', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('▶ JOGAR', W / 2, btnY + btnH / 2);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // Store play button hitbox
  charSelectBoxes.play = { x: btnX, y: btnY, w: btnW, h: btnH };

  ctx.restore();
}

function drawMenuButton(ctx, box, label) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.roundRect(box.x, box.y, box.w, box.h, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = WHITE;
  ctx.font = `600 ${Math.min(18, W * 0.04) * scale}px 'Plus Jakarta Sans', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, box.x + box.w / 2, box.y + box.h / 2);
  ctx.restore();
}

function drawPauseOverlay(ctx) {
  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.72)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = PHARMACY_GREEN_LIGHT;
  ctx.font = `800 ${Math.min(52, W * 0.1) * scale}px 'Plus Jakarta Sans', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('PAUSADO', W / 2, H * 0.28);

  ctx.font = `600 ${Math.min(18, W * 0.04) * scale}px 'Plus Jakarta Sans', sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText('Pressione P ou ESC para continuar', W / 2, H * 0.34);

  const btnW = Math.min(260, W * 0.55);
  const btnH = 44 * scale;
  const btnX = W / 2 - btnW / 2;
  const btnY = H * 0.44;
  const gap = 12 * scale;

  pauseMenuButtons.resume = { x: btnX, y: btnY, w: btnW, h: btnH };
  pauseMenuButtons.quit = { x: btnX, y: btnY + btnH + gap, w: btnW, h: btnH };

  drawMenuButton(ctx, pauseMenuButtons.resume, 'Continuar');
  drawMenuButton(ctx, pauseMenuButtons.quit, 'Voltar ao Menu');

  ctx.restore();
}

function drawGameOverScreen(ctx) {
  ctx.save();
  ctx.globalAlpha = game.gameOverAlpha;

  ctx.fillStyle = 'rgba(20, 0, 0, 0.7)';
  ctx.fillRect(0, 0, W, H);

  const titleSize = Math.min(42, W * 0.07) * scale;
  ctx.font = `800 ${titleSize}px 'Plus Jakarta Sans', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = RED;
  ctx.shadowColor = 'rgba(255,0,0,0.3)';
  ctx.shadowBlur = 15;
  ctx.fillText('FIM DE JOGO', W / 2, H * 0.32);
  ctx.shadowBlur = 0;

  ctx.font = `600 ${Math.min(18, W * 0.03) * scale}px 'Plus Jakarta Sans', sans-serif`;
  ctx.fillStyle = WHITE;
  ctx.fillText(`Pontuação: ${formatNumber(game.score)}`, W / 2, H * 0.42);
  ctx.fillText(`Distância: ${formatNumber(game.distance / 10)}m`, W / 2, H * 0.48);

  let msg;
  if (game.lastDisease) {
    msg = `O personagem morreu por ${game.lastDisease.nome}. ${game.lastDisease.agravante}`;
  } else {
    msg = "Você não conseguiu chegar ao medicamento a tempo.";
  }
  ctx.font = `600 ${Math.min(14, W * 0.025) * scale}px 'Plus Jakarta Sans', sans-serif`;
  ctx.fillText(msg, W / 2, H * 0.55);

  if (game.score >= game.highScore && game.highScore > 0) {
    ctx.fillStyle = GOLD;
    ctx.fillText('🏆 Novo Recorde!', W / 2, H * 0.62);
  }

  if (!leaderboardShowing) {
    const pulse = 0.7 + Math.sin(performance.now() / 300) * 0.3;
    ctx.globalAlpha = game.gameOverAlpha * pulse;
    ctx.font = `700 ${Math.min(18, W * 0.03) * scale}px 'Plus Jakarta Sans', sans-serif`;
    ctx.fillStyle = WHITE;
    const restartText = game.isMobile ? 'Toque para Recomeçar' : 'Clique para Recomeçar';
    ctx.fillText(restartText, W / 2, H * 0.75);
  }
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawVictoryScreen(ctx) {
  ctx.save();
  ctx.globalAlpha = game.victoryAlpha;

  ctx.fillStyle = 'rgba(0, 40, 0, 0.7)';
  ctx.fillRect(0, 0, W, H);

  const titleSize = Math.min(42, W * 0.07) * scale;
  ctx.font = `800 ${titleSize}px 'Plus Jakarta Sans', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = PHARMACY_GREEN_LIGHT;
  ctx.shadowColor = 'rgba(34,139,34,0.5)';
  ctx.shadowBlur = 20;
  ctx.fillText('ACESSO GARANTIDO!', W / 2, H * 0.3);
  ctx.shadowBlur = 0;

  // Cross
  const crossSize = 30 * scale;
  ctx.fillStyle = PHARMACY_GREEN;
  ctx.fillRect(W / 2 - crossSize / 6, H * 0.35, crossSize / 3, crossSize);
  ctx.fillRect(W / 2 - crossSize / 2, H * 0.35 + crossSize / 3, crossSize, crossSize / 3);

  ctx.font = `600 ${Math.min(18, W * 0.03) * scale}px 'Plus Jakarta Sans', sans-serif`;
  ctx.fillStyle = WHITE;
  ctx.fillText(`Pontuação Final: ${formatNumber(game.score)}`, W / 2, H * 0.52);
  ctx.fillText(`Distância: ${formatNumber(game.distance / 10)}m`, W / 2, H * 0.59);

  ctx.font = `400 ${Math.min(14, W * 0.025) * scale}px 'Plus Jakarta Sans', sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('O acesso à saúde é um direito de todos!', W / 2, H * 0.67);

  if (!leaderboardShowing) {
    const pulse = 0.7 + Math.sin(performance.now() / 300) * 0.3;
    ctx.globalAlpha = game.victoryAlpha * pulse;
    ctx.font = `700 ${Math.min(18, W * 0.03) * scale}px 'Plus Jakarta Sans', sans-serif`;
    ctx.fillStyle = WHITE;
    const restartText = game.isMobile ? 'Toque para Jogar Novamente' : 'Clique para Jogar Novamente';
    ctx.fillText(restartText, W / 2, H * 0.78);
  }
  ctx.textAlign = 'left';
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, W, H);

  if (game.state === 'title') {
    drawTitleScreen(ctx);
    particles.draw(ctx);
    drawDebug(ctx);
    return;
  }

  if (game.state === 'charSelect') {
    drawCharSelectScreen(ctx);
    particles.draw(ctx);
    drawDebug(ctx);
    return;
  }

  // === LAYER 1: Parallax Background (Sky, Buildings) ===
  bgLayers.forEach(l => l.draw(ctx));

  // === LAYER 2: Background NPCs (City inhabitants, Cars, Ambulances) ===
  // NPCs no plano de fundo (Paralaxe 0.9) para não parecerem estar na frente do player
  applyBackgroundTransform(ctx);
  for (const n of bgNpcPool) if (n.active) n.draw(ctx);
  unapplyCameraTransform(ctx);

  // === LAYER 3: Gameplay elements (Player, Obstacles, Power-ups) ===
  applyCameraTransform(ctx);
  
  drawGround(ctx);

  // Power-ups
  for (const p of powerUpPool) if (p.active) p.draw(ctx);

  // Weapons
  for (const w of weaponPool) if (w.active) w.draw(ctx);

  // Obstacles (Viruses/Obstacles)
  for (const o of obstaclePool) if (o.active) o.draw(ctx);

  // Bullets
  for (const b of bulletPool) if (b.active) b.draw(ctx);

  // Player
  player.draw(ctx);

  // Particles (in world space)
  particles.draw(ctx);

  unapplyCameraTransform(ctx);

  // === LAYER 4: HUD & Overlays (Screen space) ===
  if (game.state === 'playing') {
    drawHUD(ctx);
  }

  if (game.state === 'paused') {
    drawPauseOverlay(ctx);
  }

  if (game.state === 'gameover') {
    drawGameOverScreen(ctx);
  } else if (game.state === 'victory') {
    drawVictoryScreen(ctx);
  }

  drawDebug(ctx);
}

// ============================================================
// CLICK/TAP HANDLING
// ============================================================
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Pause menu interaction
  if (game.state === 'paused') {
    if (pointInBox(mx, my, pauseMenuButtons.resume)) { resumeGame(); return; }
    if (pointInBox(mx, my, pauseMenuButtons.quit)) { goToTitle(); return; }
    resumeGame();
    return;
  }

  // Character select screen
  if (game.state === 'charSelect') {
    if (pointInBox(mx, my, charSelectBoxes.male)) {
      game.selectedChar = 'male';
      sfxCollect();
    } else if (pointInBox(mx, my, charSelectBoxes.female)) {
      game.selectedChar = 'female';
      sfxCollect();
    } else if (pointInBox(mx, my, charSelectBoxes.play)) {
      resetGame();
    }
    return;
  }

  // During gameplay - check button clicks
  if (game.state === 'playing') {
    // Pause button
    const pauseX = 44;
    const pauseY = 42;
    const pauseDist = Math.sqrt((mx - pauseX) ** 2 + (my - pauseY) ** 2);
    if (pauseDist < 20) {
      pauseGame();
      e.stopPropagation();
      return;
    }

    // Mute button
    const muteX = W - 44;
    const muteY = 42;
    const dist = Math.sqrt((mx - muteX) ** 2 + (my - muteY) ** 2);
    if (dist < 20) {
      toggleMute();
      e.stopPropagation();
      return;
    }

    // Leaderboard button
    const lbBtnX = W - 44;
    const lbBtnY = 72;
    const lbDist = Math.sqrt((mx - lbBtnX) ** 2 + (my - lbBtnY) ** 2);
    if (lbDist < 20) {
      showLeaderboard(0, 0);
      e.stopPropagation();
      return;
    }
  }
});

// Hover detection for character select
canvas.addEventListener('mousemove', (e) => {
  if (game.state !== 'charSelect') { game.charHover = null; return; }
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if (pointInBox(mx, my, charSelectBoxes.male)) {
    game.charHover = 'male';
    canvas.style.cursor = 'pointer';
  } else if (pointInBox(mx, my, charSelectBoxes.female)) {
    game.charHover = 'female';
    canvas.style.cursor = 'pointer';
  } else if (pointInBox(mx, my, charSelectBoxes.play)) {
    game.charHover = null;
    canvas.style.cursor = 'pointer';
  } else {
    game.charHover = null;
    canvas.style.cursor = 'default';
  }
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyM') toggleMute();
  // L key to toggle leaderboard
  if (e.code === 'KeyL' && game.state === 'playing') {
    showLeaderboard(0, 0);
  }
  // Escape to close leaderboard
  if (e.code === 'Escape' && leaderboardShowing) {
    hideLeaderboard();
  }

  // Loja: troca de skins
  if (e.code === "Digit1") { // Jaleco
    if (game.coins >= 100) {
      game.coins -= 100;
      game.skin = "jaleco";
      sfxCollect();
      saveProgress();
    }
  }
  if (e.code === "Digit2") { // Farmácia Verde
    if (game.coins >= 80) {
      game.coins -= 80;
      game.skin = "verde";
      sfxCollect();
      saveProgress();
    }
  }
  if (e.code === "Digit3") { // Noturno Roxo
    if (game.coins >= 80) {
      game.coins -= 80;
      game.skin = "roxo";
      sfxCollect();
      saveProgress();
    }
  }
});

// ============================================================
// GAME LOOP (Fixed Timestep)
// ============================================================
const TICK_RATE = 1000 / 60;
let lastTime = 0;
let accumulator = 0;
let running = true;

function showFatalError(err) {
  console.error(err);
  running = false;
  if (!ctx) return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = '18px Plus Jakarta Sans, sans-serif';
  ctx.textAlign = 'center';

  const message = err && err.message ? err.message : String(err);
  const stack = err && err.stack ? err.stack.split('\n').slice(0, 4).join(' | ') : '';
  ctx.fillText('Erro no jogo: ' + message, W / 2, H / 2 - 20);
  if (stack) {
    ctx.font = '14px Plus Jakarta Sans, sans-serif';
    ctx.fillText(stack, W / 2, H / 2 + 10);
  }
  ctx.restore();
}

function gameLoop(timestamp) {
  if (!running) return;
  try {
    updateDebug();

    const deltaTime = timestamp - lastTime;
    lastTime = timestamp;
    accumulator += Math.min(deltaTime, 100);

    while (accumulator >= TICK_RATE) {
      update(TICK_RATE / 1000);
      accumulator -= TICK_RATE;
    }

    render();
    requestAnimationFrame(gameLoop);
  } catch (e) {
    showFatalError(e);
  }
}

// Start
generateClouds();
generateBuildings();
generateStorefronts();
lastTime = performance.now();
// Initialize camera position
const initialViewWidth = W / camera.zoom;
const initialLookAhead = Math.min(CAMERA_LOOK_AHEAD, initialViewWidth * 0.35);
camera.x = player.x + initialLookAhead;
camera.y = GROUND_Y - (H / (2 * camera.zoom) - GROUND_OFFSET / camera.zoom);
requestAnimationFrame(gameLoop);

// ============================================================
// TESTING HOOKS
// ============================================================
window.render_game_to_text = function() {
  const activeObstacles = obstaclePool.filter(o => o.active).map(o => ({
    x: Math.round(o.x), y: Math.round(o.y), w: o.w, h: o.h, label: o.type.label.replace('\n', ''), passed: o.passed
  }));
  const activePowerUps = powerUpPool.filter(p => p.active).map(p => ({
    x: Math.round(p.x), y: Math.round(p.y), w: p.w, h: p.h, label: p.type.label, effect: p.type.effect
  }));
  return JSON.stringify({
    state: game.state,
    score: Math.floor(game.score),
    distance: Math.floor(game.distance / 10),
    lives: game.lives,
    phase: game.currentPhase,
    phaseName: PHASES[game.currentPhase].name,
    speed: Math.round(game.speed),
    player: { x: Math.round(player.x), y: Math.round(player.y), vy: Math.round(player.vy), grounded: player.grounded },
    camera: { x: Math.round(camera.x), y: Math.round(camera.y), zoom: camera.zoom },
    activePowerUp: game.activePowerUp,
    powerUpTimer: Math.round(game.powerUpTimer * 10) / 10,
    obstacles: activeObstacles,
    powerUps: activePowerUps,
    highScore: Math.floor(game.highScore),
    note: 'Coords: origin top-left, Y increases downward, GROUND_Y=' + Math.round(GROUND_Y) + ', Camera zoom=' + camera.zoom
  });
};

window.advanceTime = function(ms) {
  const steps = Math.max(1, Math.round(ms / TICK_RATE));
  for (let i = 0; i < steps; i++) {
    update(TICK_RATE / 1000);
  }
  render();
};

// ============================================================
// RESPONSIVE HANDLER
// ============================================================
window.addEventListener('resize', () => {
  resizeCanvas();
  checkMobile();
  generateClouds();
  generateBuildings();
  generateStorefronts();
  player.y = Math.min(player.y, GROUND_Y - player.h);
});
</script>
